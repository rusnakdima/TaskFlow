<div class="theme sticky min-h-screen">
  @if (showShell()) {
    <app-header />
  }

  <main
    class="mx-auto w-full max-w-7xl lg:px-6"
    [ngClass]="showShell() ? 'p-3' : ''"
    [style.padding-bottom.px]="navPaddingBottom()"
    style="min-height: calc(100vh - 72px - 62px)"
  >
    <router-outlet />
  </main>

  @if (showShell()) {
    <!-- <app-bottom-nav /> -->
    <app-floating-bottom-nav (visibilityChange)="onNavVisibilityChange($event)" />
  }
</div>

<app-window-notify />
<app-shortcut-help />
<app-command-palette />
<app-bulk-actions />
<app-confirm-dialog />
<app-prompt-dialog />
