@if (subtask) {
  <div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-800">
    <div class="mb-3 flex items-start justify-between">
      <div class="flex items-center gap-2">
        <label
          class="inline-flex shrink-0 cursor-pointer items-center transition-all duration-200 select-none hover:scale-110"
          (click)="$event.stopPropagation()"
        >
          <app-checkbox [checked]="isSelected" (checkedChange)="onSelectionChange($event)" />
        </label>
        <div>
          <h4
            class="font-semibold"
            [ngClass]="
              subtask.status === 'completed' ||
              subtask.status === 'skipped' ||
              subtask.status === 'failed'
                ? 'text-gray-500 line-through dark:text-gray-400'
                : ''
            "
          >
            {{ subtask.title }}
          </h4>
          @if (subtask.description) {
            <p class="textMuted mt-1 line-clamp-2 text-sm">{{ subtask.description }}</p>
          }
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span
          class="rounded-full px-2 py-1 text-xs font-medium"
          [ngClass]="getSubtaskPriorityColor(subtask.priority || 'medium')"
        >
          {{ (subtask.priority || "medium").toUpperCase() }}
        </span>
        <button
          class="flex h-7 w-7 items-center justify-center rounded transition-colors"
          (click)="toggleCompletion()"
          [ngClass]="
            subtask.status === 'completed'
              ? 'bg-green-100 text-green-600 hover:bg-green-200 dark:bg-green-900/40 dark:hover:bg-green-900/60'
              : subtask.status === 'skipped'
                ? 'bg-orange-100 text-orange-600 hover:bg-orange-200 dark:bg-orange-900/40 dark:hover:bg-orange-900/60'
                : subtask.status === 'failed'
                  ? 'bg-red-100 text-red-600 hover:bg-red-200 dark:bg-red-900/40 dark:hover:bg-red-900/60'
                  : 'bg-blue-100 text-blue-500 hover:bg-blue-200 dark:bg-blue-900/40 dark:hover:bg-blue-900/60'
          "
        >
          <mat-icon
            class="h-5! w-5! min-w-5 text-xl!"
            [fontIcon]="getSubtaskStatusIcon(subtask.status)"
          />
        </button>
      </div>
    </div>

    @if (showComments()) {
      <div class="mt-4 border-t border-gray-200 pt-4 dark:border-zinc-700">
        <app-comments
          title="Subtask comments"
          [comments]="subtaskComments"
          [subtask_id]="subtask.id"
          [todo]="todo"
          (addCommentEvent)="onAddComment($event)"
          (deleteCommentEvent)="onDeleteComment($event)"
          (markAsReadEvent)="onMarkAsRead($event)"
        />
      </div>
    }

    <div
      class="mt-4 flex items-center justify-between border-t border-gray-200 pt-3 dark:border-zinc-700"
    >
      <div class="flex items-center gap-2">
        <button
          class="cursor-move rounded-lg p-2 text-gray-600 transition-colors hover:bg-gray-50 dark:text-gray-400 dark:hover:bg-gray-900/30"
          title="Drag to reorder"
        >
          <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="drag_indicator" />
        </button>
        <button
          class="rounded-lg p-2 transition-colors"
          [ngClass]="
            showComments()
              ? 'bg-purple-100 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400'
              : 'text-purple-600 hover:bg-purple-50 dark:text-purple-400 dark:hover:bg-purple-900/30'
          "
          (click)="toggleComments()"
          [title]="showComments() ? 'Hide comments' : 'Show comments'"
        >
          <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="forum" />
        </button>
      </div>
      <div class="flex items-center gap-1">
        <button
          class="rounded p-1 text-gray-600 transition-colors hover:bg-gray-50 dark:text-gray-400 dark:hover:bg-gray-900/30"
          (click)="onActionClick('edit')"
          title="Edit subtask"
        >
          <mat-icon class="h-5! w-5! min-w-5 text-2xl!" fontIcon="edit" />
        </button>
        <button
          class="rounded p-1 text-red-500 transition-colors hover:bg-red-50 dark:hover:bg-red-900/30"
          (click)="deleteSubtask()"
          title="Delete subtask"
        >
          <mat-icon class="h-5! w-5! min-w-5 text-2xl!" fontIcon="delete" />
        </button>
      </div>
    </div>
  </div>
}
