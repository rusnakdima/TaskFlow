@if (subtask) {
  <div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-800">
    <div class="mb-3 flex items-start justify-between">
      <div class="flex items-center gap-2">
        <label
          class="inline-flex shrink-0 cursor-pointer items-center transition-all duration-200 select-none hover:scale-110"
          (click)="$event.stopPropagation()"
        >
          <app-checkbox [checked]="isSelected" (checkedChange)="onSelectionChange($event)" />
        </label>
        <div>
          <h4
            class="font-semibold"
            [ngClass]="
              subtask.status === 'completed' ||
              subtask.status === 'skipped' ||
              subtask.status === 'failed'
                ? 'text-gray-500 line-through dark:text-gray-400'
                : ''
            "
          >
            {{ subtask.title }}
          </h4>
          @if (subtask.description) {
            <p class="textMuted mt-1 line-clamp-2 text-sm">{{ subtask.description }}</p>
          }
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span
          class="rounded-full px-2 py-1 text-xs font-medium"
          [ngClass]="getSubtaskPriorityColor(subtask.priority || 'medium')"
        >
          {{ (subtask.priority || "medium").toUpperCase() }}
        </span>
        <button
          class="flex h-7 w-7 items-center justify-center rounded-lg transition-all duration-200 hover:scale-110"
          (click)="toggleCompletion()"
          [ngClass]="getStatusBgColor(subtask.status)"
        >
          <mat-icon class="h-5! w-5! min-w-5 text-xl!" [fontIcon]="getStatusIcon(subtask.status)" />
        </button>
      </div>
    </div>

    <app-comments
      [comments]="subtaskComments"
      [subtask_id]="subtask.id"
      [todo]="todo"
      (addCommentEvent)="onAddComment($event)"
      (deleteCommentEvent)="onDeleteComment($event)"
      (markAsReadEvent)="onMarkAsRead($event)"
    />

    <div
      class="mt-4 flex items-center justify-between border-t border-gray-200 pt-3 dark:border-zinc-700"
    >
      <div class="flex items-center gap-2">
        <button [class]="getActionColor('dragHandle')" cdkDragHandle title="Drag to reorder">
          <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="drag_indicator" />
        </button>
      </div>
      <div class="flex items-center gap-1">
        <button
          [class]="getActionColor('edit')"
          (click)="onActionClick('edit')"
          title="Edit subtask"
        >
          <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="edit" />
        </button>
        <button [class]="getActionColor('delete')" (click)="deleteSubtask()" title="Delete subtask">
          <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="delete" />
        </button>
      </div>
    </div>
  </div>
}
