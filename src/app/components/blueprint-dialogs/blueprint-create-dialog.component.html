@if (show) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="w-full max-w-md rounded-xl bg-white p-6 dark:bg-zinc-800">
      <h3 class="mb-4 text-xl font-bold">Save as Blueprint</h3>
      <div class="space-y-4">
        <div>
          <label class="mb-1 block text-sm font-medium">Blueprint Name</label>
          <input
            type="text"
            class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 dark:border-zinc-600 dark:bg-zinc-700"
            [ngModel]="name"
            (ngModelChange)="nameChange.emit($event)"
          />
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium">Description</label>
          <textarea
            class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 dark:border-zinc-600 dark:bg-zinc-700"
            rows="3"
            [ngModel]="description"
            (ngModelChange)="descriptionChange.emit($event)"
          ></textarea>
        </div>
      </div>
      <div class="mt-6 flex justify-end gap-2">
        <button class="btn-cancel px-4 py-2" (click)="cancel.emit()">Cancel</button>
        <button class="btn-accent px-4 py-2" (click)="confirm.emit()">Save Blueprint</button>
      </div>
    </div>
  </div>
}
