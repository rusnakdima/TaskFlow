<button
  mat-icon-button
  class="flex items-center justify-center rounded-lg text-2xl! transition-all duration-200 hover:scale-110"
  [ngClass]="getButtonClass()"
  (click)="onToggle(); $event.stopPropagation()"
  [title]="getTitle()"
>
  <mat-icon class="text-2xl!" [fontIcon]="getIcon()" />
</button>
