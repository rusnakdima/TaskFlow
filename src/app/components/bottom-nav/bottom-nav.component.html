<div class="styleBottomNav">
  @for (nav of listNavs; track $index) {
    <div class="flex flex-col items-center justify-center">
      <div
        class="group flex cursor-pointer flex-col items-center justify-center rounded-lg p-2 transition-all duration-200"
        [routerLink]="nav.url"
        [queryParams]="nav.query"
        [ngClass]="
          url() === nav.url
            ? 'bg-blue-50 dark:bg-blue-900/30'
            : 'hover:bg-gray-50 dark:hover:bg-zinc-800'
        "
      >
        <mat-icon
          class="h-6! w-6! min-w-6 text-2xl! transition-colors"
          [fontIcon]="nav.icon"
          [ngClass]="
            url() === nav.url
              ? 'text-blue-600! dark:text-blue-400!'
              : 'textMuted group-hover:textNormal'
          "
        />
        <span
          class="mt-1 text-xs font-medium transition-colors"
          [ngClass]="
            url() === nav.url
              ? 'text-blue-600 dark:text-blue-400'
              : 'textMuted group-hover:textNormal'
          "
        >
          {{ nav.label }}
        </span>
      </div>
    </div>
  }
</div>
