@if (show) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="w-full max-w-md rounded-xl bg-white p-6 dark:bg-zinc-800">
      <h3 class="mb-4 text-xl font-bold">Transfer Ownership</h3>
      <div class="space-y-4">
        <p class="text-sm text-gray-600 dark:text-gray-400">
          Select a new owner for this todo. The new owner will have full permissions.
        </p>
        <div>
          <label class="mb-1 block text-sm font-medium">Select User</label>
          <div class="flex items-center gap-2">
            <button
              type="button"
              class="flex items-center gap-2 rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm dark:border-zinc-600 dark:bg-zinc-700"
              [matMenuTriggerFor]="ownerMenu"
            >
              @if (getSelectedProfile(); as profile) {
                @if (profile.image_url) {
                  <img
                    [src]="profile.image_url"
                    [alt]="profile.name"
                    class="h-6 w-6 rounded-full object-cover"
                  />
                } @else {
                  <div
                    class="flex h-6 w-6 items-center justify-center rounded-full bg-gray-300 text-[10px] font-bold text-gray-600 dark:bg-zinc-600 dark:text-gray-300"
                  >
                    {{ (profile.name[0] || "") + (profile.last_name[0] || "") | uppercase }}
                  </div>
                }
                <span>{{ profile.name }} {{ profile.last_name }}</span>
              } @else {
                <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="person" />
                <span>Select User</span>
              }
              <mat-icon class="h-4! w-4! min-w-4 text-base!" fontIcon="expand_more" />
            </button>
            <mat-menu
              #ownerMenu="matMenu"
              class="overflow-hidden rounded-xl border border-gray-200 shadow-2xl dark:border-zinc-700"
            >
              @for (profile of availableProfiles; track profile.id) {
                <button
                  mat-menu-item
                  (click)="onUserSelected(profile)"
                  class="flex w-full items-center gap-3"
                  [class.badge-accent]="selectedUserId === profile.user_id"
                >
                  @if (profile.image_url) {
                    <img
                      [src]="profile.image_url"
                      [alt]="profile.name"
                      class="h-8 w-8 rounded-full object-cover"
                    />
                  } @else {
                    <div
                      class="flex h-8 w-8 items-center justify-center rounded-full bg-gray-300 text-xs font-bold text-gray-600 dark:bg-zinc-600 dark:text-gray-300"
                    >
                      {{ (profile.name[0] || "") + (profile.last_name[0] || "") | uppercase }}
                    </div>
                  }
                  <div class="flex flex-col">
                    <span [class.font-bold]="selectedUserId === profile.user_id"
                      >{{ profile.name }} {{ profile.last_name }}</span
                    >
                    @if (profile.user?.email) {
                      <span class="text-xs text-gray-500">{{ profile.user?.email }}</span>
                    }
                  </div>
                </button>
              }
            </mat-menu>
          </div>
        </div>
      </div>
      <div class="mt-6 flex justify-end gap-2">
        <button class="btn-cancel px-4 py-2" (click)="onCancel()">Cancel</button>
        <button class="btn-accent px-4 py-2" [disabled]="!selectedUserId" (click)="onConfirm()">
          Transfer Ownership
        </button>
      </div>
    </div>
  </div>
}
