<div class="flex flex-wrap items-center justify-end gap-2">
  @if (showInfoToggle) {
    <button
      class="flex h-min items-center gap-2 rounded-lg border border-gray-300 p-3 text-gray-700 transition-colors hover:bg-gray-50 dark:border-zinc-600 dark:text-gray-300 dark:hover:bg-zinc-800"
      (click)="onToggleInfo()"
      title="Toggle info"
    >
      <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="info" />
      <span class="textNormal hidden text-sm font-medium sm:inline">{{ getInfoLabel() }}</span>
    </button>
  }

  <button
    class="flex h-min items-center gap-2 rounded-lg border border-gray-300 p-3 text-gray-700 transition-colors hover:bg-gray-50 dark:border-zinc-600 dark:text-gray-300 dark:hover:bg-zinc-800"
    (click)="onToggleSelectAll()"
  >
    <app-checkbox
      [checked]="getIsAllSelected()"
      [indeterminate]="getIndeterminate()"
      [highlight]="getHighlight()"
    />
    <span class="hidden text-sm font-medium sm:inline" [ngClass]="getTextColor()">
      {{ getSelectText() }}
    </span>
  </button>

  @if (getShowFilter()) {
    <button
      class="flex h-min items-center gap-2 rounded-lg border border-gray-300 p-3 text-gray-700 transition-colors hover:bg-gray-50 dark:border-zinc-600 dark:text-gray-300 dark:hover:bg-zinc-800"
      (click)="onToggleFilter()"
    >
      <mat-icon class="h-5! w-5! min-w-5 text-xl!" [fontIcon]="getFilterIcon()" />
      <span class="hidden sm:inline">Filter</span>
    </button>
  }

  @if (newItemRoute) {
    <button class="styleButSuccess h-min gap-2 p-3 text-sm" [routerLink]="newItemRoute">
      <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="add" />
      <span class="hidden sm:inline">{{ newItemLabel }}</span>
    </button>
  } @else if (newItemLabel) {
    <button class="styleButSuccess h-min gap-2 p-3 text-sm" (click)="onNewItem()">
      <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="add" />
      <span class="hidden sm:inline">{{ newItemLabel }}</span>
    </button>
  }

  <app-view-mode-switcher
    [mode]="getViewMode()"
    [pageKey]="pageKey"
    (modeChange)="onViewModeChange($event)"
  />
</div>
