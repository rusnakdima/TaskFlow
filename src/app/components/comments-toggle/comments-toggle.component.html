<button
  class="rounded-lg p-2 transition-colors {{ buttonClasses }}"
  (click)="onClick($event)"
  [title]="showComments ? 'Hide comments' : 'Show comments'"
>
  <div class="relative flex items-center gap-1">
    <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="forum" />
    @if (unreadCount > 0) {
      <div
        class="absolute -top-1 -right-1 h-2.5 w-2.5 animate-pulse rounded-full border-2 border-white bg-blue-500 dark:border-zinc-800"
      ></div>
    }
    @if (count > 0 && unreadCount === 0) {
      <span class="text-[10px] font-bold">{{ count }}</span>
    }
  </div>
</button>
