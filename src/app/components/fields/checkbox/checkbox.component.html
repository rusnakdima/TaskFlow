@if (form && field) {
  <label class="flex cursor-pointer items-center gap-2" [formGroup]="form">
    <div
      class="checkbox"
      [class.checkbox--checked]="form.get(field.name)?.value"
      (click)="toggleField(field.name)"
    >
      @if (form.get(field.name)?.value) {
        <svg
          class="h-3 w-3 text-white"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="3"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      }
    </div>
    <span class="text-sm font-medium whitespace-nowrap select-none">{{ label }}</span>
  </label>
} @else {
  <label class="flex cursor-pointer items-center gap-2 select-none">
    <div
      class="checkbox"
      [class.checkbox--checked]="checked && !indeterminate"
      [class.checkbox--indeterminate]="indeterminate"
      [class.checkbox--highlight]="highlight && (checked || indeterminate)"
      (click)="toggle()"
    >
      @if (checked && !indeterminate) {
        <svg
          class="h-3 w-3 text-white"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="3"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      }
      @if (indeterminate) {
        <div class="h-0.5 w-2.5 bg-white"></div>
      }
    </div>
    @if (label) {
      <span class="text-sm font-medium whitespace-nowrap">{{ label }}</span>
    }
  </label>
}
