<ng-template #fieldWrapper>
  <div class="flex w-full flex-col" [formGroup]="form">
    <ng-content />
  </div>
</ng-template>

<ng-template #fieldError let-fieldName="fieldName">
  @if (isInvalid(fieldName)) {
    @if (form.get(fieldName)?.errors?.["required"]) {
      <mat-error>Field '{{ field.label }}' should not be empty</mat-error>
    } @else if (form.get(fieldName)?.errors?.["minlength"]) {
      <mat-error>Field '{{ field.label }}' must be at least 6 characters long</mat-error>
    }
  }
</ng-template>

<div class="flex w-full flex-col" [formGroup]="form">
  <mat-form-field class="flex flex-col">
    <mat-label>{{ label }}</mat-label>
    <input
      matInput
      type="text"
      formControlName="{{ field.name }}"
      [readonly]="field.readonly ? true : false"
    />
    <ng-container *ngTemplateOutlet="fieldError; context: { fieldName: field.name }" />
  </mat-form-field>
</div>
