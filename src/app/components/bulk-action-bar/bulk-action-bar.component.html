@if (showBar) {
  <div class="bulk-action-bar">
    <div class="bg-blue-600 dark:bg-blue-700 text-white rounded-xl shadow-lg overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3">
        <!-- Left Side - Selection Info -->
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-2 px-3 py-1 bg-white/20 rounded-full">
            <mat-icon class="w-5! h-5! text-base!">check_circle</mat-icon>
            <span class="font-semibold">{{ selectedCount }} {{ entityType }} selected</span>
          </div>
        </div>

        <!-- Right Side - Actions -->
        <div class="flex items-center gap-2">
          @for (action of actions; track action.id) {
            <button
              mat-button
              [color]="action.color || 'default'"
              (click)="onAction(action.id)"
              class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg transition-all bg-white/10 hover:bg-white/20 border border-white/20 text-white!"
            >
              <mat-icon class="w-4! h-4! text-base!">{{ action.icon }}</mat-icon>
              <span>{{ action.label }}</span>
            </button>
          }

          <button
            mat-icon-button
            (click)="onCancel()"
            class="bulk-cancel-btn ml-2 bg-white/10 hover:bg-white/20 text-white!"
            aria-label="Cancel selection"
          >
            <mat-icon class="w-5! h-5! text-base!">close</mat-icon>
          </button>
        </div>
      </div>
    </div>
  </div>
}
