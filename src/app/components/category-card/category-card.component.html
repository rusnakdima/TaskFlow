<div
  class="rounded-lg border border-gray-200 bg-gray-50 p-2 transition-shadow hover:shadow-md dark:border-zinc-600 dark:bg-zinc-700"
  [ngClass]="{ 'border-blue-500 bg-blue-50 dark:bg-blue-900/20': isSelected }"
>
  <div class="flex items-center gap-2">
    <app-checkbox [checked]="isSelected" (checkedChange)="toggleSelection($event)" />

    <h4 class="textNormal flex-1 truncate font-medium">{{ category.title }}</h4>

    <div class="flex shrink-0 gap-1">
      <button [class]="getActionColor('edit')" (click)="onEdit()" title="Edit category">
        <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="edit" />
      </button>
      <button [class]="getActionColor('archive')" (click)="onArchive()" title="Archive category">
        <mat-icon class="h-5! w-5! min-w-5 text-xl!" fontIcon="archive" />
      </button>
    </div>
  </div>
</div>
