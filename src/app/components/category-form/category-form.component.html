@if (isVisible) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
    (click)="onBackdropClick($event)"
    (keydown)="onKeyDown($event)"
    tabindex="-1"
  >
    <div
      class="mx-4 w-full max-w-md scale-100 transform rounded-xl border-2 border-[var(--accent-color)]/50 opacity-100 shadow-xl transition-all duration-300 dark:border-[var(--accent-color)]/50"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-center justify-between border-b border-[var(--accent-color)] p-6">
        <h3 class="textNormal text-lg font-semibold">
          {{ editingCategory ? "Edit Category" : "Create New Category" }}
        </h3>
        <button
          class="rounded-lg p-1 transition-colors hover:bg-gray-100 dark:hover:bg-zinc-700"
          (click)="closeModal()"
        >
          <mat-icon class="textMuted h-5! w-5! min-w-5 text-xl!" fontIcon="close" />
        </button>
      </div>

      <div class="p-6">
        <div class="space-y-4">
          <app-unified-field
            [field]="titleFieldDef"
            [form]="categoryFormGroup"
            class="w-full"
            (valueChange)="onTitleChange($event)"
          />
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 border-t border-[var(--accent-color)] p-6">
        <app-button variant="cancel" (clicked)="closeModal()" [disabled]="isLoading">
          Cancel
        </app-button>
        <app-button
          variant="accent"
          (clicked)="saveCategory()"
          [disabled]="!titleFormControl.value?.trim() || isLoading"
          [loading]="isLoading"
        >
          {{ editingCategory ? "Update" : "Create" }}
        </app-button>
      </div>
    </div>
  </div>
}
