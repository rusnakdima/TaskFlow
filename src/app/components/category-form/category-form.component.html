@if (isVisible) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
    (click)="onBackdropClick($event)"
    (keydown)="onKeyDown($event)"
    tabindex="-1"
  >
    <div
      class="mx-4 w-full max-w-md scale-100 transform rounded-xl border border-gray-200 bg-white opacity-100 shadow-xl transition-all duration-300 dark:border-zinc-700 dark:bg-zinc-800"
      (click)="$event.stopPropagation()"
    >
      <div
        class="flex items-center justify-between border-b border-gray-200 p-6 dark:border-zinc-700"
      >
        <h3 class="textNormal text-lg font-semibold">
          {{ editingCategory ? "Edit Category" : "Create New Category" }}
        </h3>
        <button
          class="rounded-lg p-1 transition-colors hover:bg-gray-100 dark:hover:bg-zinc-700"
          (click)="closeModal()"
        >
          <mat-icon class="textMuted h-5! w-5! min-w-5 text-xl!" fontIcon="close" />
        </button>
      </div>

      <div class="p-6">
        <div class="space-y-4">
          <div>
            <label class="textNormal mb-2 block text-sm font-medium"> Category Title </label>
            <input
              type="text"
              [(ngModel)]="categoryTitle"
              placeholder="Enter category title"
              class="textNormal w-full rounded-lg border border-gray-300 bg-white px-4 py-3 transition-colors focus:border-transparent focus:ring-2 focus:ring-blue-500 dark:border-zinc-600 dark:bg-zinc-700"
              [disabled]="isLoading"
              autofocus
            />
          </div>
        </div>
      </div>

      <div
        class="flex items-center justify-end gap-3 border-t border-gray-200 p-6 dark:border-zinc-700"
      >
        <button
          class="rounded-lg border border-gray-300 px-4 py-2 text-gray-700 transition-colors hover:bg-gray-50 dark:border-zinc-600 dark:text-gray-300 dark:hover:bg-zinc-700"
          (click)="closeModal()"
          [disabled]="isLoading"
        >
          Cancel
        </button>
        <button
          class="styleButSuccess px-4 py-2"
          (click)="saveCategory()"
          [disabled]="!categoryTitle.trim() || isLoading"
        >
          @if (isLoading) {
            <mat-icon class="mr-2 h-4! w-4! min-w-4 animate-spin text-sm!" fontIcon="refresh" />
            Saving...
          } @else {
            {{ editingCategory ? "Update" : "Create" }}
          }
        </button>
      </div>
    </div>
  </div>
}
