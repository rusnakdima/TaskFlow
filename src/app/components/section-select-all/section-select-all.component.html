<button
  class="focus:ring-accent/50 flex h-min items-center gap-2 rounded-lg border border-gray-300 p-3 text-gray-700 transition-colors hover:bg-gray-50 focus:ring-2 focus:outline-none dark:border-zinc-600 dark:text-gray-300 dark:hover:bg-zinc-800"
  (click)="onToggle()"
>
  <app-checkbox [checked]="checked" [indeterminate]="indeterminate" [highlight]="highlight" />
  @if (label) {
    <span class="hidden text-sm font-medium lg:inline">
      {{ label }}
    </span>
  }
</button>
