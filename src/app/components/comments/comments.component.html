<div
  class="flex flex-col gap-4 mt-4 border-t border-gray-200 dark:border-zinc-700 pt-4 animate-in fade-in slide-in-from-top-2 duration-300"
>
  <div class="flex items-center justify-between">
    <h4 class="text-sm font-semibold textNormal flex items-center gap-2">
      <mat-icon class="w-4! h-4! text-xl!" fontIcon="forum" />
      Comments ({{ comments.length }})
    </h4>
  </div>

  <!-- Comments List -->
  <div #commentsList class="flex flex-col gap-3 max-h-60 overflow-y-auto pr-1">
    @for (comment of comments; track comment.id) {
      <div
        [attr.data-comment-id]="comment.id"
        [id]="'comment-' + comment.id"
        class="flex flex-col gap-1 p-3 rounded-lg bg-gray-50 dark:bg-zinc-900/50 border border-gray-100 dark:border-zinc-700/50 transition-colors"
        [class.unread-comment]="isUnread(comment)"
        [class.border-blue-200]="isUnread(comment)"
        [class.dark:border-blue-900/30]="isUnread(comment)"
        [ngClass]="{ 'ring-2 ring-purple-500 animate-pulse': highlightCommentId === comment.id }"
      >
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            @if (isUnread(comment)) {
              <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
            }
            <span class="text-xs font-bold text-purple-600 dark:text-purple-400">
              {{ comment.authorName }}
            </span>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-[10px] textMuted">
              {{ formatDate(comment.createdAt) }}
            </span>
            @if (isOwner || comment.authorId === currentUserId) {
              <button
                class="p-1 rounded-md hover:bg-red-50 dark:hover:bg-red-900/30 text-red-500 transition-colors"
                (click)="deleteComment(comment.id)"
                title="Delete comment"
              >
                <mat-icon class="w-4! h-4! text-lg!" fontIcon="delete" />
              </button>
            }
          </div>
        </div>
        <p class="text-sm textNormal whitespace-pre-wrap">{{ comment.content }}</p>
      </div>
    } @empty {
      <div class="flex flex-col items-center justify-center py-6 text-gray-400 dark:text-gray-500">
        <mat-icon class="w-8! h-8! text-4xl! mb-2 opacity-20" fontIcon="chat_bubble_outline" />
        <p class="text-xs italic">No comments yet</p>
      </div>
    }
  </div>

  <!-- Add Comment -->
  <div class="flex flex-col gap-2 mt-2">
    <div class="relative flex flex-row items-center">
      <textarea
        [ngModel]="newCommentContent()"
        (ngModelChange)="newCommentContent.set($event)"
        (keydown.control.enter)="addComment(); $event.preventDefault()"
        placeholder="Add a comment..."
        class="w-full px-3 pr-11 py-2 text-sm bg-white dark:bg-zinc-800 border border-gray-300 dark:border-zinc-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none textNormal resize-none transition-all duration-200"
        rows="2"
      ></textarea>
      <div class="absolute right-2 flex items-center">
        <button
          [disabled]="!newCommentContent().trim()"
          (click)="addComment()"
          class="p-1.5 rounded-lg bg-purple-600 hover:bg-purple-700 disabled:bg-gray-400 dark:disabled:bg-zinc-700 text-white shadow-sm transition-all duration-200"
          title="Post comment"
        >
          <mat-icon class="w-4! h-4! text-lg!" fontIcon="send" />
        </button>
      </div>
    </div>
  </div>
</div>
