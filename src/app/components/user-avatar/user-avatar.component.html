@if (src && src.trim() !== "") {
  <img [ngClass]="imgClasses" [src]="src" [alt]="name" (error)="onImageError($event)" />
} @else if (showGroupIcon) {
  <div [ngClass]="divClasses">
    <mat-icon [ngClass]="iconClasses">group</mat-icon>
  </div>
} @else {
  <div [ngClass]="divClasses">
    <span [ngClass]="textClasses">{{ initials }}</span>
  </div>
}
