@if (showBulkActions) {
  <div class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 pointer-events-auto">
    <div
      class="bg-gray-900/95 dark:bg-gray-800/95 backdrop-blur-sm text-white rounded-2xl shadow-2xl border border-gray-700/50 px-5 py-3"
    >
      <div class="flex items-center gap-3">
        <!-- Selection Info -->
        <div class="flex items-center gap-2 pr-3 border-r border-gray-700">
          <div
            class="flex items-center gap-1.5 px-2.5 py-1 bg-blue-600 rounded-full whitespace-nowrap"
          >
            <mat-icon class="w-5! h-5! text-xl! leading-none!">check_circle</mat-icon>
            <span class="font-semibold text-xs whitespace-nowrap"
              >{{ selectedCount }} selected</span
            >
          </div>
          <button
            class="font-medium text-gray-300 hover:text-white transition-colors min-w-0! px-2! py-1!"
            (click)="onSelectAll()"
          >
            {{ isAllSelected ? "Deselect All" : "Select All" }}
          </button>
        </div>

        <!-- Action Buttons - Admin/Archive Mode -->
        @if (mode === "admin" || mode === "archive") {
          <div class="flex items-center gap-1.5">
            <!-- Archive Button -->
            <button
              color="warn"
              class="flex items-center gap-1 px-3 py-1.5 bg-orange-600 hover:bg-orange-700 transition-colors rounded-lg text-xs font-medium whitespace-nowrap min-h-8!"
              (click)="onSoftDelete()"
              matTooltip="Toggle Archive Status"
            >
              <mat-icon class="w-5! h-5! text-xl! leading-none!">archive</mat-icon>
              <span class="hidden sm:inline">Archive/Restore</span>
            </button>

            <!-- Hard Delete Button -->
            <button
              color="warn"
              class="flex items-center gap-1 px-3 py-1.5 bg-red-600 hover:bg-red-700 transition-colors rounded-lg text-xs font-medium whitespace-nowrap min-h-8!"
              (click)="onHardDelete()"
              matTooltip="Permanently Delete"
            >
              <mat-icon class="w-5! h-5! text-xl! leading-none!">delete_forever</mat-icon>
              <span class="hidden sm:inline">Delete</span>
            </button>
          </div>
        }

        <!-- Action Buttons - Todos Mode (Archive only) -->
        @if (mode === "todos") {
          <div class="flex items-center gap-1.5">
            <button
              class="flex items-center gap-1 px-3 py-1.5 bg-orange-600 hover:bg-orange-700 transition-colors rounded-lg text-xs font-medium whitespace-nowrap min-h-8!"
              (click)="onSoftDelete()"
              matTooltip="Move to Archive"
            >
              <mat-icon class="w-5! h-5! text-xl! leading-none!">archive</mat-icon>
              <span class="hidden sm:inline">Archive</span>
            </button>
          </div>
        }

        <!-- Action Buttons - Categories Mode -->
        @if (mode === "categories") {
          <div class="flex items-center gap-1.5">
            <button
              class="flex items-center gap-1 px-3 py-1.5 bg-red-600 hover:bg-red-700 transition-colors rounded-lg text-xs font-medium whitespace-nowrap min-h-8!"
              (click)="onHardDelete()"
              matTooltip="Delete selected categories"
            >
              <mat-icon class="w-5! h-5! text-xl! leading-none!">delete</mat-icon>
              <span class="hidden sm:inline">Delete</span>
            </button>
          </div>
        }

        <!-- Action Buttons - Tasks/Subtasks Mode -->
        @if (mode === "tasks" || mode === "subtasks") {
          <div class="flex items-center gap-1.5">
            <!-- Status Buttons -->
            <button
              class="flex items-center gap-1 px-3 py-1.5 bg-gray-600 hover:bg-gray-700 transition-colors rounded-lg text-xs font-medium whitespace-nowrap min-h-8!"
              (click)="onSetStatus('pending')"
              matTooltip="Mark as Pending"
            >
              <mat-icon class="w-5! h-5! text-xl! leading-none!">schedule</mat-icon>
              <span class="hidden sm:inline">Pending</span>
            </button>

            <button
              class="flex items-center gap-1 px-3 py-1.5 bg-green-600 hover:bg-green-700 transition-colors rounded-lg text-xs font-medium whitespace-nowrap min-h-8!"
              (click)="onSetStatus('completed')"
              matTooltip="Mark as Completed"
            >
              <mat-icon class="w-5! h-5! text-xl! leading-none!">check_circle</mat-icon>
              <span class="hidden sm:inline">Complete</span>
            </button>

            <button
              class="flex items-center gap-1 px-3 py-1.5 bg-yellow-600 hover:bg-yellow-700 transition-colors rounded-lg text-xs font-medium whitespace-nowrap min-h-8!"
              (click)="onSetStatus('skipped')"
              matTooltip="Mark as Skipped"
            >
              <mat-icon class="w-5! h-5! text-xl! leading-none!">skip_next</mat-icon>
              <span class="hidden sm:inline">Skip</span>
            </button>

            <button
              class="flex items-center gap-1 px-3 py-1.5 bg-red-600 hover:bg-red-700 transition-colors rounded-lg text-xs font-medium whitespace-nowrap min-h-8!"
              (click)="onSetStatus('failed')"
              matTooltip="Mark as Failed"
            >
              <mat-icon class="w-5! h-5! text-xl! leading-none!">error</mat-icon>
              <span class="hidden sm:inline">Fail</span>
            </button>

            <!-- Archive Button -->
            <button
              color="warn"
              class="flex items-center gap-1 px-3 py-1.5 bg-orange-600 hover:bg-orange-700 transition-colors rounded-lg text-xs font-medium whitespace-nowrap min-h-8!"
              (click)="onSoftDelete()"
              matTooltip="Move to Archive"
            >
              <mat-icon class="w-5! h-5! text-xl! leading-none!">archive</mat-icon>
              <span class="hidden sm:inline">Archive</span>
            </button>
          </div>
        }

        <!-- Divider -->
        <div class="w-px h-6 bg-gray-700"></div>

        <!-- Cancel Button -->
        <button
          class="text-gray-400 hover:text-white transition-colors min-w-8! h-8! w-8!"
          (click)="onCancel()"
          matTooltip="Cancel Selection"
        >
          <mat-icon class="w-5! h-5! text-xl! leading-none!">close</mat-icon>
        </button>
      </div>
    </div>
  </div>
}
