<div
  class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg p-4"
>
  <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <span class="text-sm font-medium text-blue-800 dark:text-blue-200">
        {{ selectedCount }} task(s) selected
      </span>
      <button
        class="text-sm text-blue-600 dark:text-blue-400 hover:underline"
        (click)="onSelectAll()"
      >
        {{ isAllSelected ? "Deselect All" : "Select All" }}
      </button>
    </div>

    <div class="flex flex-wrap items-center gap-2">
      <span class="text-sm textMuted">Bulk Actions:</span>

      <button
        class="px-3 py-1.5 text-sm bg-white dark:bg-zinc-700 border border-gray-300 dark:border-zinc-600 rounded-lg hover:bg-gray-50 dark:hover:bg-zinc-600 flex items-center gap-1"
        (click)="onPriorityChange('high')"
      >
        <mat-icon class="w-3.5! h-3.5! text-sm!" fontIcon="priority_high" />
        High Priority
      </button>

      <button
        class="px-3 py-1.5 text-sm bg-white dark:bg-zinc-700 border border-gray-300 dark:border-zinc-600 rounded-lg hover:bg-gray-50 dark:hover:bg-zinc-600 flex items-center gap-1"
        (click)="onPriorityChange('medium')"
      >
        <mat-icon class="w-3.5! h-3.5! text-sm!" fontIcon="remove" />
        Medium Priority
      </button>

      <button
        class="px-3 py-1.5 text-sm bg-white dark:bg-zinc-700 border border-gray-300 dark:border-zinc-600 rounded-lg hover:bg-gray-50 dark:hover:bg-zinc-600 flex items-center gap-1"
        (click)="onPriorityChange('low')"
      >
        <mat-icon class="w-3.5! h-3.5! text-sm!" fontIcon="arrow_downward" />
        Low Priority
      </button>

      <button
        class="px-3 py-1.5 text-sm bg-white dark:bg-zinc-700 border border-gray-300 dark:border-zinc-600 rounded-lg hover:bg-gray-50 dark:hover:bg-zinc-600 flex items-center gap-1"
        (click)="onStatusChange()"
      >
        <mat-icon class="w-3.5! h-3.5! text-sm!" fontIcon="check_circle" />
        Complete
      </button>

      <button
        class="px-3 py-1.5 text-sm bg-red-100 dark:bg-red-900/30 border border-red-300 dark:border-red-700 text-red-700 dark:text-red-300 rounded-lg hover:bg-red-200 dark:hover:bg-red-900/50 flex items-center gap-1"
        (click)="onDelete()"
      >
        <mat-icon class="w-3.5! h-3.5! text-sm!" fontIcon="delete" />
        Delete
      </button>

      <button
        class="px-3 py-1.5 text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-zinc-700 rounded-lg"
        (click)="onCancel()"
      >
        Cancel
      </button>
    </div>
  </div>
</div>
