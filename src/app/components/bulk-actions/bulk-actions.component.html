<div class="bulk-actions-panel">
  <div
    class="bg-gradient-to-r from-blue-600 to-blue-700 dark:from-blue-700 dark:to-blue-800 text-white rounded-xl shadow-lg p-4"
  >
    <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
      <!-- Left Side - Selection Info -->
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 px-3 py-1.5 bg-white/20 rounded-full">
          <mat-icon class="w-5! h-5! text-base!">check_circle</mat-icon>
          <span class="font-semibold">{{ selectedCount }} task(s) selected</span>
        </div>
        <button
          class="px-3 py-1.5 text-sm font-medium bg-white/10 hover:bg-white/20 rounded-lg transition-colors"
          (click)="onSelectAll()"
        >
          {{ isAllSelected ? "Deselect All" : "Select All" }}
        </button>
      </div>

      <!-- Right Side - Action Buttons -->
      <div class="flex flex-wrap items-center gap-2">
        <span class="text-sm text-blue-100 mr-2 hidden sm:inline">Actions:</span>

        <!-- Priority Buttons Group -->
        <div class="flex items-center gap-1.5">
          <button
            class="px-3 py-1.5 text-sm font-medium bg-white/10 hover:bg-white/20 rounded-lg transition-colors flex items-center gap-1.5"
            (click)="onPriorityChange('high')"
            title="Set High Priority"
          >
            <mat-icon class="w-4! h-4! text-base!" fontIcon="priority_high" />
            <span class="hidden sm:inline">High</span>
          </button>

          <button
            class="px-3 py-1.5 text-sm font-medium bg-white/10 hover:bg-white/20 rounded-lg transition-colors flex items-center gap-1.5"
            (click)="onPriorityChange('medium')"
            title="Set Medium Priority"
          >
            <mat-icon class="w-4! h-4! text-base!" fontIcon="remove" />
            <span class="hidden sm:inline">Medium</span>
          </button>

          <button
            class="px-3 py-1.5 text-sm font-medium bg-white/10 hover:bg-white/20 rounded-lg transition-colors flex items-center gap-1.5"
            (click)="onPriorityChange('low')"
            title="Set Low Priority"
          >
            <mat-icon class="w-4! h-4! text-base!" fontIcon="arrow_downward" />
            <span class="hidden sm:inline">Low</span>
          </button>
        </div>

        <div class="w-px h-6 bg-white/30 mx-1"></div>

        <!-- Complete Button -->
        <button
          class="px-3 py-1.5 text-sm font-medium bg-green-500/80 hover:bg-green-500 rounded-lg transition-colors flex items-center gap-1.5"
          (click)="onStatusChange()"
        >
          <mat-icon class="w-4! h-4! text-base!" fontIcon="check_circle" />
          <span class="hidden sm:inline">Complete</span>
        </button>

        <!-- Delete Button -->
        <button
          class="px-3 py-1.5 text-sm font-medium bg-red-500/80 hover:bg-red-500 rounded-lg transition-colors flex items-center gap-1.5"
          (click)="onDelete()"
        >
          <mat-icon class="w-4! h-4! text-base!" fontIcon="delete" />
          <span class="hidden sm:inline">Delete</span>
        </button>

        <div class="w-px h-6 bg-white/30 mx-1"></div>

        <!-- Cancel Button -->
        <button
          class="px-3 py-1.5 text-sm font-medium bg-white/10 hover:bg-white/20 rounded-lg transition-colors"
          (click)="onCancel()"
        >
          <mat-icon class="w-4! h-4! text-base!" fontIcon="close" />
        </button>
      </div>
    </div>
  </div>
</div>
