@if (showBulkActions) {
  <div class="pointer-events-auto fixed bottom-20 left-1/2 z-50 -translate-x-1/2">
    <div
      class="rounded-2xl border border-gray-700/50 bg-gray-900/95 px-5 py-3 text-white shadow-2xl backdrop-blur-sm dark:bg-gray-800/95"
    >
      <div class="flex items-center gap-3">
        <!-- Selection Info -->
        <div class="flex items-center gap-2 border-r border-gray-700 pr-3">
          <div
            class="flex items-center gap-1.5 rounded-full bg-blue-600 px-2.5 py-1 whitespace-nowrap"
          >
            <mat-icon class="h-5! w-5! min-w-5 text-xl! leading-none!">check_circle</mat-icon>
            <span class="text-xs font-semibold whitespace-nowrap"
              >{{ selectedCount }} selected</span
            >
          </div>
          <button
            class="min-w-0! px-2! py-1! font-medium text-gray-300 transition-colors hover:text-white"
            (click)="onSelectAll()"
          >
            {{ isAllSelected ? "Deselect All" : "Select All" }}
          </button>
        </div>

        <!-- Action Buttons - Admin/Archive Mode -->
        @if (mode === "admin" || mode === "archive") {
          <div class="flex items-center gap-1.5">
            <!-- Archive Button -->
            <button
              color="warn"
              class="flex min-h-8! items-center gap-1 rounded-lg bg-orange-600 px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors hover:bg-orange-700"
              (click)="onSoftDelete()"
              matTooltip="Toggle Archive Status"
            >
              <mat-icon class="h-5! w-5! min-w-5 text-xl! leading-none!">archive</mat-icon>
              <span class="hidden sm:inline">Archive/Restore</span>
            </button>

            <!-- Hard Delete Button -->
            <button
              color="warn"
              class="flex min-h-8! items-center gap-1 rounded-lg bg-red-600 px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors hover:bg-red-700"
              (click)="onHardDelete()"
              matTooltip="Permanently Delete"
            >
              <mat-icon class="h-5! w-5! min-w-5 text-xl! leading-none!">delete_forever</mat-icon>
              <span class="hidden sm:inline">Delete</span>
            </button>
          </div>
        }

        <!-- Action Buttons - Todos Mode (Archive only) -->
        @if (mode === "todos") {
          <div class="flex items-center gap-1.5">
            <button
              class="flex min-h-8! items-center gap-1 rounded-lg bg-orange-600 px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors hover:bg-orange-700"
              (click)="onSoftDelete()"
              matTooltip="Move to Archive"
            >
              <mat-icon class="h-5! w-5! min-w-5 text-xl! leading-none!">archive</mat-icon>
              <span class="hidden sm:inline">Archive</span>
            </button>
          </div>
        }

        <!-- Action Buttons - Categories Mode -->
        @if (mode === "categories") {
          <div class="flex items-center gap-1.5">
            <button
              class="flex min-h-8! items-center gap-1 rounded-lg bg-orange-600 px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors hover:bg-orange-700"
              (click)="onSoftDelete()"
              matTooltip="Archive selected categories"
            >
              <mat-icon class="h-5! w-5! min-w-5 text-xl! leading-none!">archive</mat-icon>
              <span class="hidden sm:inline">Archive</span>
            </button>
          </div>
        }

        <!-- Action Buttons - Tasks/Subtasks Mode -->
        @if (mode === "tasks" || mode === "subtasks") {
          <div class="flex items-center gap-1.5">
            <!-- Status Buttons -->
            <button
              class="flex min-h-8! items-center gap-1 rounded-lg bg-gray-600 px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors hover:bg-gray-700"
              (click)="onSetStatus('pending')"
              matTooltip="Mark as Pending"
            >
              <mat-icon class="h-5! w-5! min-w-5 text-xl! leading-none!">schedule</mat-icon>
              <span class="hidden sm:inline">Pending</span>
            </button>

            <button
              class="flex min-h-8! items-center gap-1 rounded-lg bg-green-600 px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors hover:bg-green-700"
              (click)="onSetStatus('completed')"
              matTooltip="Mark as Completed"
            >
              <mat-icon class="h-5! w-5! min-w-5 text-xl! leading-none!">check_circle</mat-icon>
              <span class="hidden sm:inline">Complete</span>
            </button>

            <button
              class="flex min-h-8! items-center gap-1 rounded-lg bg-yellow-600 px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors hover:bg-yellow-700"
              (click)="onSetStatus('skipped')"
              matTooltip="Mark as Skipped"
            >
              <mat-icon class="h-5! w-5! min-w-5 text-xl! leading-none!">skip_next</mat-icon>
              <span class="hidden sm:inline">Skip</span>
            </button>

            <button
              class="flex min-h-8! items-center gap-1 rounded-lg bg-red-600 px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors hover:bg-red-700"
              (click)="onSetStatus('failed')"
              matTooltip="Mark as Failed"
            >
              <mat-icon class="h-5! w-5! min-w-5 text-xl! leading-none!">error</mat-icon>
              <span class="hidden sm:inline">Fail</span>
            </button>

            <!-- Archive Button -->
            <button
              color="warn"
              class="flex min-h-8! items-center gap-1 rounded-lg bg-orange-600 px-3 py-1.5 text-xs font-medium whitespace-nowrap transition-colors hover:bg-orange-700"
              (click)="onSoftDelete()"
              matTooltip="Move to Archive"
            >
              <mat-icon class="h-5! w-5! min-w-5 text-xl! leading-none!">archive</mat-icon>
              <span class="hidden sm:inline">Archive</span>
            </button>
          </div>
        }

        <!-- Divider -->
        <div class="h-6 w-px bg-gray-700"></div>

        <!-- Cancel Button -->
        <button
          class="h-8! w-8! min-w-8! text-gray-400 transition-colors hover:text-white"
          (click)="onCancel()"
          matTooltip="Cancel Selection"
        >
          <mat-icon class="h-5! w-5! min-w-5 text-xl! leading-none!">close</mat-icon>
        </button>
      </div>
    </div>
  </div>
}
