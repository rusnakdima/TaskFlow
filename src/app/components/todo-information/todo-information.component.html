<div
  class="bg-white dark:bg-zinc-800 rounded-xl shadow-lg border border-gray-200 dark:border-zinc-700 overflow-hidden"
>
  <div
    class="relative bg-linear-to-r from-blue-500 to-blue-600 dark:from-blue-600 dark:to-blue-700 p-6 text-white"
  >
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 w-full">
      <div class="flex flex-col sm:flex-1 w-full">
        <div class="flex items-center gap-3 mb-2">
          <mat-icon class="w-6! h-6! text-2xl!" fontIcon="assignment" />
          <h1 class="text-2xl font-bold">{{ todo.title || "Untitled Project" }}</h1>
        </div>
        <p class="text-blue-100 mb-4 truncate max-w-lg">{{ todo.description }}</p>

        <div class="grid grid-cols-2 gap-4 text-center sm:text-left w-full max-w-xs">
          <div class="flex flex-col">
            <div class="text-xl font-bold">{{ getCompletedTasksCount() }}</div>
            <div class="text-blue-200 text-sm">Completed Tasks</div>
          </div>
          <div class="flex flex-col">
            <div class="text-xl font-bold">{{ getInProgressTasksCount() }}</div>
            <div class="text-blue-200 text-sm">In Progress</div>
          </div>
        </div>

        <div class="mt-4">
          <app-progress-bar [items]="todo.tasks || []" [showLegend]="true" size="lg" />
        </div>
      </div>
    </div>

    <div class="absolute top-4 right-4 flex items-center gap-2">
      @if (isOwner) {
        <a
          [routerLink]="['/todos', todo.id, 'edit_todo']"
          [queryParams]="{ isOwner: isOwner, isPrivate: isPrivate }"
          class="flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 w-10 h-10 transition-colors"
          title="Edit Project"
        >
          <mat-icon class="w-5! h-5! text-xl!" fontIcon="edit" />
        </a>
      }
    </div>
  </div>
</div>
