<div
  class="rounded-xl border border-gray-200 bg-transparent p-6 shadow-lg dark:border-zinc-700 dark:bg-transparent"
>
  <div class="mb-6 flex items-center gap-3">
    <div
      class="flex h-10 w-10 items-center justify-center rounded-lg bg-purple-100 dark:bg-purple-900/30"
    >
      <mat-icon
        class="h-5! w-5! min-w-5 text-xl! text-purple-600 dark:text-purple-400"
        fontIcon="flag"
      />
    </div>
    <div>
      <h3 class="textNormal text-lg font-semibold">Priority</h3>
      <p class="textMuted text-sm">Set the priority level</p>
    </div>
  </div>

  <div class="space-y-2">
    <mat-radio-group
      [value]="priority"
      [disabled]="disabled"
      (change)="priorityChange.emit($event.value)"
      class="space-y-3"
    >
      <mat-radio-button
        value="urgent"
        class="flex w-full cursor-pointer items-center gap-3 rounded-lg border-2 border-red-500 bg-red-50 p-3 transition-colors hover:bg-red-100 dark:border-red-400 dark:bg-red-900/20 dark:hover:bg-red-900/30"
      >
        <div class="flex flex-1 items-center gap-2">
          <div class="h-3 w-3 animate-pulse rounded-full bg-red-500"></div>
          <div>
            <div
              class="textNormal flex items-center gap-1 font-bold text-red-600 dark:text-red-400"
            >
              Urgent
              <mat-icon class="h-4! w-4! text-sm!" fontIcon="local_fire_department" />
            </div>
            <div class="textMuted text-xs">Immediate attention required</div>
          </div>
        </div>
      </mat-radio-button>
      <mat-radio-button
        value="high"
        class="flex w-full cursor-pointer items-center gap-3 rounded-lg border border-gray-200 p-3 shadow-sm transition-all hover:border-red-400 hover:bg-red-50/50 hover:shadow-md dark:border-zinc-600 dark:hover:border-red-500/50 dark:hover:bg-red-900/10"
      >
        <div class="flex flex-1 items-center gap-2">
          <div class="h-3 w-3 rounded-full bg-red-500 ring-2 ring-red-200 dark:ring-red-800"></div>
          <div>
            <div class="textNormal font-semibold">High</div>
            <div class="textMuted text-xs">Critical priority</div>
          </div>
        </div>
      </mat-radio-button>
      <mat-radio-button
        value="medium"
        class="flex w-full cursor-pointer items-center gap-3 rounded-lg border border-gray-200 p-3 shadow-sm transition-all hover:border-yellow-400 hover:bg-yellow-50/50 hover:shadow-md dark:border-zinc-600 dark:hover:border-yellow-500/50 dark:hover:bg-yellow-900/10"
      >
        <div class="flex flex-1 items-center gap-2">
          <div
            class="h-3 w-3 rounded-full bg-yellow-500 ring-2 ring-yellow-200 dark:ring-yellow-800"
          ></div>
          <div>
            <div class="textNormal font-semibold">Medium</div>
            <div class="textMuted text-xs">Normal priority</div>
          </div>
        </div>
      </mat-radio-button>
      <mat-radio-button
        value="low"
        class="flex w-full cursor-pointer items-center gap-3 rounded-lg border border-gray-200 p-3 shadow-sm transition-all hover:border-green-400 hover:bg-green-50/50 hover:shadow-md dark:border-zinc-600 dark:hover:border-green-500/50 dark:hover:bg-green-900/10"
      >
        <div class="flex flex-1 items-center gap-2">
          <div
            class="h-3 w-3 rounded-full bg-green-500 ring-2 ring-green-200 dark:ring-green-800"
          ></div>
          <div>
            <div class="textNormal font-semibold">Low</div>
            <div class="textMuted text-xs">When time permits</div>
          </div>
        </div>
      </mat-radio-button>
    </mat-radio-group>
  </div>
</div>
