<div
  class="rounded-xl border border-gray-200 bg-white p-6 shadow-lg dark:border-zinc-700 dark:bg-zinc-800"
>
  <div class="mb-6 flex items-center gap-3">
    <div
      class="flex h-10 w-10 items-center justify-center rounded-lg bg-purple-100 dark:bg-purple-900/30"
    >
      <mat-icon
        class="h-5! w-5! min-w-5 text-xl! text-purple-600 dark:text-purple-400"
        fontIcon="flag"
      />
    </div>
    <div>
      <h3 class="textNormal text-lg font-semibold">Priority</h3>
      <p class="textMuted text-sm">Set the priority level</p>
    </div>
  </div>

  <div class="space-y-2">
    <mat-radio-group
      [value]="priority"
      (change)="priorityChange.emit($event.value)"
      class="space-y-3"
    >
      <mat-radio-button
        value="high"
        class="flex w-full cursor-pointer items-center gap-3 rounded-lg border border-gray-200 p-3 transition-colors hover:bg-gray-300 dark:border-zinc-600 dark:hover:bg-zinc-600"
      >
        <div class="flex flex-1 items-center gap-2">
          <div class="h-3 w-3 rounded-full bg-red-500"></div>
          <div>
            <div class="textNormal font-medium">High</div>
            <div class="textMuted text-xs">Critical priority</div>
          </div>
        </div>
      </mat-radio-button>
      <mat-radio-button
        value="medium"
        class="flex w-full cursor-pointer items-center gap-3 rounded-lg border border-gray-200 p-3 transition-colors hover:bg-gray-300 dark:border-zinc-600 dark:hover:bg-zinc-600"
      >
        <div class="flex flex-1 items-center gap-2">
          <div class="h-3 w-3 rounded-full bg-yellow-500"></div>
          <div>
            <div class="textNormal font-medium">Medium</div>
            <div class="textMuted text-xs">Normal priority</div>
          </div>
        </div>
      </mat-radio-button>
      <mat-radio-button
        value="low"
        class="flex w-full cursor-pointer items-center gap-3 rounded-lg border border-gray-200 p-3 transition-colors hover:bg-gray-300 dark:border-zinc-600 dark:hover:bg-zinc-600"
      >
        <div class="flex flex-1 items-center gap-2">
          <div class="h-3 w-3 rounded-full bg-green-500"></div>
          <div>
            <div class="textNormal font-medium">Low</div>
            <div class="textMuted text-xs">When time permits</div>
          </div>
        </div>
      </mat-radio-button>
    </mat-radio-group>
  </div>
</div>
