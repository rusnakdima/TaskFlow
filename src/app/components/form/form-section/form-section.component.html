<div

>
  <div class="mb-6 flex items-center gap-3">
    <div [ngClass]="iconBgClass">
      <mat-icon [ngClass]="iconClass" [fontIcon]="icon" />
    </div>
    <div>
      <h3 class="textNormal text-lg font-semibold">{{ title }}</h3>
      <p class="textMuted text-sm">{{ description }}</p>

  </div>
  <ng-content />
</div>
