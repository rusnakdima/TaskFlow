<div
  class="rounded-xl border-2 border-[var(--accent-color)]/50 p-6 shadow-lg dark:border-[var(--accent-color)]/50"
>
  <div class="mb-6 flex items-center gap-3">
    <div
      class="flex h-10 w-10 items-center justify-center rounded-lg bg-orange-100 dark:bg-orange-900/30"
    >
      <mat-icon
        class="h-5! w-5! min-w-5 text-xl! text-orange-600 dark:text-orange-400"
        fontIcon="schedule"
      />
    </div>
    <div>
      <h3 class="textNormal text-lg font-semibold">Timeline</h3>
      <p class="textMuted text-sm">Set start date, end date, and repeat</p>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-6 md:grid-cols-3">
    <mat-form-field class="w-full">
      <mat-label>Start Date</mat-label>
      <input
        matInput
        [matDatepicker]="startPicker"
        [value]="startDate"
        (dateChange)="onStartDateChange($event.value)"
      />
      <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
      <mat-datepicker #startPicker></mat-datepicker>
    </mat-form-field>

    @if (startDate) {
      <mat-form-field class="w-full">
        <mat-label>End Date</mat-label>
        <input
          matInput
          [matDatepicker]="endPicker"
          [value]="endDate"
          (dateChange)="onEndDateChange($event.value)"
          [min]="minEndDate"
        />
        <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
    }

    @if (showRepeat) {
      <mat-form-field class="w-full">
        <mat-label>Repeat</mat-label>
        <mat-select [value]="repeat" (selectionChange)="onRepeatChange($event.value)">
          <mat-option value="none">None</mat-option>
          <mat-option value="daily">Daily</mat-option>
          <mat-option value="weekly">Weekly</mat-option>
          <mat-option value="monthly">Monthly</mat-option>
        </mat-select>
      </mat-form-field>
    }
  </div>
</div>
