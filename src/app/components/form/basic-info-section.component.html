<app-form-section
  icon="info"
  title="Basic Information"
  [description]="'Essential details about your ' + itemType"
  iconColor="blue"
>
  <div class="grid grid-cols-1 gap-6">
    <app-unified-field
      [field]="titleFieldDef"
      [form]="basicInfoFormGroup"
      class="w-full"
      (valueChange)="onTitleChange($event)"
    />

    <app-unified-field
      [field]="descriptionFieldDef"
      [form]="basicInfoFormGroup"
      class="w-full"
      (valueChange)="onDescriptionChange($event)"
    />
  </div>
</app-form-section>
