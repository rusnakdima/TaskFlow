<div
  class="relative rounded-xl border border-gray-200 bg-transparent p-6 shadow-lg dark:border-zinc-700 dark:bg-transparent"
>
  @if (disabled) {
    <div
      class="absolute inset-0 z-10 flex items-center justify-center rounded-xl bg-gray-200/60 dark:bg-zinc-800/60"
    >
      <div class="flex items-center gap-2 rounded-lg bg-white px-4 py-2 shadow-lg dark:bg-zinc-700">
        <mat-icon class="text-gray-500" fontIcon="lock" />
        <span class="text-sm font-medium text-gray-600 dark:text-gray-300">Owner only</span>
      </div>
    </div>
  }
  <div class="mb-6 flex items-center gap-3">
    <div
      class="flex h-10 w-10 items-center justify-center rounded-lg bg-green-100 dark:bg-green-900/30"
    >
      <mat-icon
        class="h-5! w-5! min-w-5 text-xl! text-green-600 dark:text-green-400"
        fontIcon="visibility"
      />
    </div>
    <div>
      <h3 class="textNormal text-lg font-semibold">Visibility</h3>
      <p class="textMuted text-sm">Control who can see this project</p>
    </div>
  </div>

  <div class="space-y-2">
    <mat-radio-group
      [value]="visibility"
      (change)="visibilityChange.emit($event.value)"
      class="space-y-3"
    >
      <mat-radio-button
        value="private"
        class="flex w-full cursor-pointer items-center gap-3 rounded-lg border border-gray-200 p-3 transition-colors hover:bg-gray-300 dark:border-zinc-600 dark:hover:bg-zinc-600"
      >
        <div class="flex flex-1 items-center gap-2">
          <mat-icon class="text-gray-500 dark:text-gray-400" fontIcon="lock" />
          <div>
            <div class="textNormal font-medium">Private</div>
            <div class="textMuted text-xs">Only you can see this</div>
          </div>
        </div>
      </mat-radio-button>
      <mat-radio-button
        value="shared"
        class="flex w-full cursor-pointer items-center gap-3 rounded-lg border border-gray-200 p-3 transition-colors hover:bg-gray-300 dark:border-zinc-600 dark:hover:bg-zinc-600"
      >
        <div class="flex flex-1 items-center gap-2">
          <mat-icon class="text-blue-500 dark:text-blue-400" fontIcon="group" />
          <div>
            <div class="textNormal font-medium">Shared</div>
            <div class="textMuted text-xs">Shared with specific people</div>
          </div>
        </div>
      </mat-radio-button>
      <mat-radio-button
        value="public"
        class="flex w-full cursor-pointer items-center gap-3 rounded-lg border border-gray-200 p-3 transition-colors hover:bg-gray-300 dark:border-zinc-600 dark:hover:bg-zinc-600"
      >
        <div class="flex flex-1 items-center gap-2">
          <mat-icon class="text-green-500 dark:text-green-400" fontIcon="public" />
          <div>
            <div class="textNormal font-medium">Public</div>
            <div class="textMuted text-xs">Visible to everyone</div>
          </div>
        </div>
      </mat-radio-button>
    </mat-radio-group>
  </div>
</div>
