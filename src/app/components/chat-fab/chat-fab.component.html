<button
  (click)="toggle.emit()"
  class="fixed right-6 bottom-20 z-40 flex h-14 w-14 items-center justify-center rounded-full bg-blue-600 text-white shadow-lg transition-all duration-300 hover:scale-110 hover:bg-blue-700"
>
  <mat-icon class="h-8 w-8 min-w-8 text-2xl!" [fontIcon]="isOpen ? 'close' : 'chat'" />
  @if (unreadCount > 0) {
    <span
      class="absolute -top-1 -right-1 rounded-full border-2 border-white bg-red-500 px-1.5 py-0.5 text-[10px] font-bold text-white dark:border-zinc-800"
    >
      {{ unreadCount }}
    </span>
  }
</button>
