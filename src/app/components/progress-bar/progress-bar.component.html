<div class="w-full">
  @if (showLabel || showPercentage) {
    <div class="mb-1 flex items-center justify-between text-xs">
      @if (showLabel) {
        <span class="textMuted">Progress</span>
      }
      @if (showPercentage) {
        <span class="textNormal font-medium">{{ totalProgress() }}%</span>
      }
    </div>
  }

  <div
    class="w-full overflow-hidden rounded-full bg-gray-200 dark:bg-zinc-700"
    [ngClass]="heightClass"
  >
    <div class="flex h-full overflow-hidden rounded-full">
      @for (segment of segments(); track segment.status) {
        <div
          class="h-full transition-all duration-300"
          [ngClass]="segment.color"
          [style.width.%]="segment.percentage"
          [title]="segment.status + ': ' + segment.percentage + '%'"
        ></div>
      }
    </div>
  </div>

  @if (showLegend) {
    <div class="textMuted mt-1.5 flex flex-wrap gap-x-3 gap-y-1 text-xs">
      @for (segment of segments(); track segment.status) {
        <span class="flex items-center gap-1">
          <div class="h-1.5 w-1.5 rounded-full" [ngClass]="segment.color"></div>
          {{ segment.status }}: {{ segment.percentage }}%
        </span>
      }
    </div>
  }
</div>
