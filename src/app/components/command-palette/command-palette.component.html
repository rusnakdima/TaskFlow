@if (isOpen()) {
  <div
    class="command-palette-backdrop fixed inset-0 z-[9999] flex items-start justify-center bg-black/50 pt-[15vh]"
    (click)="onBackdropClick($event)"
  >
    <div
      class="w-full max-w-2xl overflow-hidden rounded-xl border border-zinc-200 bg-white shadow-2xl dark:border-zinc-700 dark:bg-zinc-900"
    >
      <div class="flex items-center gap-3 border-b border-zinc-200 px-4 py-3 dark:border-zinc-700">
        <mat-icon class="h-5! w-5! min-w-5 text-2xl! text-zinc-400" fontIcon="search" />
        <input
          type="text"
          class="flex-1 rounded-lg bg-transparent px-2 py-1 text-base text-zinc-900 placeholder-zinc-400 outline-none dark:text-zinc-100"
          placeholder="Search projects, tasks, categories..."
          [(ngModel)]="searchQuery"
          (input)="onSearch()"
          #searchInput
        />
        <kbd
          class="hidden items-center rounded bg-zinc-100 px-2 py-1 text-xs font-medium text-zinc-500 sm:inline-flex dark:bg-zinc-800"
          >ESC</kbd
        >
      </div>

      <div class="max-h-[60vh] overflow-y-auto">
        @if (allFlatItems().length === 0) {
          <div class="py-8 text-center text-zinc-500">
            <mat-icon class="mb-2 h-5! w-5! min-w-5 text-2xl!" fontIcon="search_off" />
            <p>No results found</p>
          </div>
        } @else {
          @for (group of getGroupedItems(); track group.category) {
            <div class="py-2">
              <div class="px-4 py-1 text-xs font-semibold tracking-wider text-zinc-500 uppercase">
                {{ group.category }}
              </div>
              @for (item of group.items; track item.id; let i = $index) {
                <button
                  #itemBtn
                  class="flex w-full items-center gap-3 px-4 py-2.5 text-left transition-colors hover:bg-zinc-100 dark:hover:bg-zinc-800"
                  [class.bg-zinc-100]="allFlatItems().indexOf(item) === selectedIndex()"
                  [class.dark:bg-zinc-800]="allFlatItems().indexOf(item) === selectedIndex()"
                  (click)="selectItem(item)"
                  (mouseenter)="selectedIndex.set(allFlatItems().indexOf(item))"
                >
                  @if (item.icon) {
                    <mat-icon
                      class="h-5! w-5! min-w-5 text-2xl! text-zinc-500 dark:text-zinc-400"
                      [fontIcon]="item.icon"
                    />
                  }
                  <div class="min-w-0 flex-1">
                    <div class="truncate text-sm font-medium text-zinc-900 dark:text-zinc-100">
                      {{ item.label }}
                    </div>
                    @if (item.description) {
                      <div class="truncate text-xs text-zinc-500 dark:text-zinc-400">
                        {{ item.description }}
                      </div>
                    }
                  </div>
                  @if (
                    item.category === "page" ||
                    item.category === "project" ||
                    item.category === "task"
                  ) {
                    <mat-icon
                      class="h-4! w-4! min-w-4 text-xl! text-zinc-300 dark:text-zinc-600"
                      fontIcon="arrow_forward"
                    />
                  }
                </button>
              }
            </div>
          }
        }
      </div>

      <div
        class="flex items-center justify-between border-t border-zinc-200 bg-zinc-50 px-4 py-2 dark:border-zinc-700 dark:bg-zinc-800/50"
      >
        <div class="flex items-center gap-4 text-xs text-zinc-500">
          <span class="flex items-center gap-1">
            <kbd class="flex items-center rounded bg-zinc-200 px-1.5 py-0.5 dark:bg-zinc-700">
              <mat-icon class="!text-sm! h-3! w-3! min-w-3" fontIcon="keyboard_arrow_up" />
              <mat-icon class="!text-sm! h-3! w-3! min-w-3" fontIcon="keyboard_arrow_down" />
            </kbd>
            Navigate
          </span>
          <span class="flex items-center gap-1">
            <kbd class="flex items-center rounded bg-zinc-200 px-1.5 py-0.5 dark:bg-zinc-700">
              <mat-icon class="!text-sm! h-3! w-3! min-w-3" fontIcon="keyboard_return" />
            </kbd>
            Select
          </span>
        </div>
        <span class="text-xs text-zinc-400">Ctrl+K</span>
      </div>
    </div>
  </div>
}
