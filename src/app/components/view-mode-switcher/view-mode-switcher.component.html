<div class="inline-flex items-center rounded-lg border border-gray-300 p-1 dark:border-zinc-600">
  @if (isModeAvailable("card")) {
    <ng-container
      *ngTemplateOutlet="modeButton; context: { mode: 'card', icon: 'view_agenda', label: 'List' }"
    />
  }
  @if (isModeAvailable("grid")) {
    <ng-container
      *ngTemplateOutlet="modeButton; context: { mode: 'grid', icon: 'grid_view', label: 'Grid' }"
    />
  }
  @if (isModeAvailable("table")) {
    <ng-container
      *ngTemplateOutlet="modeButton; context: { mode: 'table', icon: 'table_rows', label: 'Table' }"
    />
  }
  @if (isModeAvailable("kanban")) {
    <ng-container
      *ngTemplateOutlet="
        modeButton;
        context: { mode: 'kanban', icon: 'view_kanban', label: 'Kanban' }
      "
    />
  }
</div>

<ng-template #modeButton let-mode="mode" let-icon="icon" let-label="label">
  <button
    type="button"
    class="inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-sm font-medium transition-colors"
    [class.bg-[var(--accent-100)]]="this.mode === mode"
    [class.dark:bg-[var(--accent-900)]]="this.mode === mode"
    [class.text-black]="this.mode === mode"
    [class.dark:text-white]="this.mode === mode"
    [class.text-gray-700]="this.mode !== mode"
    [class.dark:text-gray-300]="this.mode !== mode"
    [class.hover:bg-gray-100]="this.mode !== mode"
    [class.dark:hover:bg-zinc-700]="this.mode !== mode"
    (click)="setMode(mode)"
    [title]="
      label === 'List'
        ? 'One column'
        : label === 'Grid'
          ? 'Multi column'
          : label === 'Table'
            ? 'Table view'
            : 'Kanban board'
    "
  >
    <mat-icon class="!h-4 !w-4" [fontIcon]="icon" />
    <span class="hidden sm:inline">{{ label }}</span>
  </button>
</ng-template>
