<div class="flex items-center gap-2">
  @if (options.length === 0) {
    <span class="text-sm text-gray-400">Loading...</span>
  }
  <div class="hidden rounded-lg border border-gray-300 p-1 lg:inline-flex dark:border-zinc-600">
    @for (option of options; track option.id) {
      <button
        class="flex items-center gap-2 rounded-md px-3 py-1.5 text-sm font-medium transition-colors"
        [class.bg-[var(--accent-100)]]="active === option.id"
        [class.dark:bg-[var(--accent-900)]]="active === option.id"
        [class.text-black]="active === option.id"
        [class.dark:text-white]="active === option.id"
        [class.text-gray-700]="active !== option.id"
        [class.dark:text-gray-300]="active !== option.id"
        [class.hover:bg-gray-100]="active !== option.id"
        [class.dark:hover:bg-zinc-700]="active !== option.id"
        (click)="onSelect(option.id)"
      >
        @if (option.icon) {
          <mat-icon
            class="h-4! w-4! min-w-4 text-base!"
            [class.text-black]="active === option.id"
            [class.dark:text-white]="active === option.id"
            [class.text-gray-400]="active !== option.id"
            [fontIcon]="option.icon"
          />
        }
        {{ option.label }}
      </button>
    }
  </div>

  <div class="flex items-center gap-2 lg:hidden">
    <button
      class="flex h-min items-center gap-2 rounded-lg border border-gray-300 p-3 text-gray-700 transition-colors hover:bg-gray-50 dark:border-zinc-600 dark:text-gray-300 dark:hover:bg-zinc-800"
      [matMenuTriggerFor]="selectorMenu"
    >
      @if (getActiveOption()?.icon) {
        <mat-icon class="h-5! w-5! min-w-5 text-xl!" [fontIcon]="getActiveOption()!.icon!" />
      }
      <span class="hidden font-medium md:inline">{{ getActiveOption()?.label }}</span>
      <mat-icon class="h-4! w-4! min-w-4 text-base!" fontIcon="expand_more" />
    </button>
    <mat-menu
      #selectorMenu="matMenu"
      class="overflow-hidden rounded-xl border border-gray-200 shadow-2xl dark:border-zinc-700"
    >
      <ng-container
        *ngTemplateOutlet="
          menuItemTemplate;
          context: { options: options, active: active, select: select }
        "
      />
    </mat-menu>
  </div>
</div>

<ng-template #menuItemTemplate let-options="options" let-active="active" let-select="select">
  @for (option of options; track option.id) {
    <button
      mat-menu-item
      (click)="select.emit(option.id)"
      class="flex w-full items-center gap-3"
      [class.badge-accent]="active === option.id"
    >
      @if (option.icon) {
        <mat-icon
          class="size-5! min-w-5 text-xl!"
          [class.text-black]="active === option.id"
          [class.dark:text-white]="active === option.id"
          [class.text-gray-400]="active !== option.id"
          [fontIcon]="option.icon"
        />
      }
      <span [class.font-bold]="active === option.id">{{ option.label }}</span>
    </button>
  }
</ng-template>
