<div class="flex flex-col gap-6">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl sm:text-3xl font-bold textNormal">Categories</h1>
      <p class="textMuted mt-1">Manage your project categories.</p>
    </div>

    <div class="flex gap-2">
      <button class="styleButSuccess text-sm px-4 py-2" (click)="toggleCreateForm()">
        <mat-icon class="w-5! h-5! text-xl! mr-2" fontIcon="add" />
        New Category
      </button>
    </div>
  </div>

  <app-category-form
    [isVisible]="showCreateForm()"
    [editingCategory]="editingCategory()"
    (close)="onFormClose()"
    (saved)="onFormSaved()"
  />

  <div
    class="bg-white dark:bg-zinc-800 rounded-xl p-3 shadow-lg border border-gray-200 dark:border-zinc-700"
  >
    <div class="flex items-center gap-2 mb-4">
      <button
        class="h-min px-3 py-1 border border-gray-300 dark:border-zinc-600 rounded-lg hover:bg-gray-50 dark:hover:bg-zinc-800 transition-colors flex items-center gap-2 shrink-0"
        (click)="toggleSelectAll()"
      >
        <app-checkbox
          class="pointer-events-none"
          [checked]="isAllSelected()"
          [indeterminate]="selectedCategories().size > 0 && !isAllSelected()"
          [highlight]="selectedCategories().size > 0 && !isAllSelected()"
        />
        <span
          class="text-sm font-medium"
          [ngClass]="
            selectedCategories().size > 0 && !isAllSelected()
              ? 'text-yellow-700 dark:text-yellow-400'
              : 'textNormal'
          "
        >
          {{
            isAllSelected()
              ? "Deselect All"
              : selectedCategories().size > 0
                ? "Clear Selection"
                : "Select All"
          }}
        </span>
      </button>

      <app-search
        class="flex-1"
        [isShowSearchField]="true"
        [tempArray]="tempListCategories()"
        [searchByFields]="['title']"
        (array)="searchFunc($event)"
      />
    </div>

    @if (listCategories().length === 0) {
      <div class="text-center py-5">
        <mat-icon class="w-12! h-12! text-5xl! textMuted mb-4" fontIcon="category" />
        <h3 class="text-xl font-semibold textNormal mb-2">No categories found</h3>
        <p class="textMuted mb-6">Get started by creating your first category</p>
      </div>
    } @else {
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        @for (category of listCategories(); track category.id) {
          <app-category-card
            [category]="category"
            [isSelected]="selectedCategories().has(category.id)"
            (edit)="editCategory($event)"
            (delete)="deleteCategory($event)"
            (selectionChangeEvent)="toggleCategorySelection($event)"
          />
        }
      </div>
    }
  </div>
</div>

<app-bulk-actions
  [selectedCount]="selectedCategories().size"
  [isAllSelected]="isAllSelected()"
  mode="categories"
  (selectAllEvent)="toggleSelectAll()"
  (hardDeleteEvent)="bulkDelete()"
  (cancelEvent)="clearSelection()"
/>
