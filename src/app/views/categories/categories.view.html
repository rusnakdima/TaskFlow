<div class="flex flex-col gap-6">
  <div class="flex flex-col items-start justify-between gap-4 sm:flex-row sm:items-center">
    <div>
      <h1 class="textNormal text-2xl font-bold sm:text-3xl">Categories</h1>
      <p class="textMuted mt-1">Manage your project categories.</p>
    </div>

    <div class="flex gap-2">
      <button class="styleButSuccess px-4 py-2 text-sm" (click)="toggleCreateForm()">
        <mat-icon class="mr-2 h-5! w-5! min-w-5 text-xl!" fontIcon="add" />
        New Category
      </button>
    </div>
  </div>

  <app-category-form
    [isVisible]="showCreateForm()"
    [editingCategory]="editingCategory()"
    (close)="onFormClose()"
    (saved)="onFormSaved()"
  />

  <div
    class="rounded-xl border border-gray-200 bg-white p-3 shadow-lg dark:border-zinc-700 dark:bg-zinc-800"
  >
    <div class="mb-4 flex items-center gap-2">
      <button
        class="flex h-min shrink-0 items-center gap-2 rounded-lg border border-gray-300 px-3 py-1 transition-colors hover:bg-gray-50 dark:border-zinc-600 dark:hover:bg-zinc-800"
        (click)="toggleSelectAll()"
      >
        <app-checkbox
          class="pointer-events-none"
          [checked]="isAllSelected()"
          [indeterminate]="selectedCategories().size > 0 && !isAllSelected()"
          [highlight]="selectedCategories().size > 0 && !isAllSelected()"
        />
        <span
          class="text-sm font-medium"
          [ngClass]="
            selectedCategories().size > 0 && !isAllSelected()
              ? 'text-yellow-700 dark:text-yellow-400'
              : 'textNormal'
          "
        >
          {{
            isAllSelected()
              ? "Deselect All"
              : selectedCategories().size > 0
                ? "Clear Selection"
                : "Select All"
          }}
        </span>
      </button>

      <app-search
        class="flex-1"
        [isShowSearchField]="true"
        [tempArray]="tempListCategories()"
        [searchByFields]="['title']"
        (array)="searchFunc($event)"
      />
    </div>

    @if (listCategories().length === 0) {
      <div class="py-5 text-center">
        <mat-icon class="textMuted mb-4 h-12! w-12! min-w-12 text-5xl!" fontIcon="category" />
        <h3 class="textNormal mb-2 text-xl font-semibold">No categories found</h3>
        <p class="textMuted mb-6">Get started by creating your first category</p>
      </div>
    } @else {
      <div class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3">
        @for (category of listCategories(); track category.id) {
          <app-category-card
            [category]="category"
            [isSelected]="selectedCategories().has(category.id)"
            (edit)="editCategory($event)"
            (delete)="deleteCategory($event)"
            (selectionChangeEvent)="toggleCategorySelection($event)"
          />
        }
      </div>
    }
  </div>
</div>

<app-bulk-actions
  [selectedCount]="selectedCategories().size"
  [isAllSelected]="isAllSelected()"
  mode="categories"
  (selectAllEvent)="toggleSelectAll()"
  (hardDeleteEvent)="bulkDelete()"
  (cancelEvent)="clearSelection()"
/>
