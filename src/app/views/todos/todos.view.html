<div class="flex flex-col gap-4">
  <div class="flex items-center justify-between gap-2">
    <app-segment-selector
      [options]="visibilityOptions"
      [active]="stateService.activeVisibility()"
      (select)="onVisibilityChange($any($event))"
    />

    <app-page-toolbar
      [config]="getToolbarConfig()"
      [filterFields]="filterFields"
      (filtersChange)="onFiltersChange($event)"
      (searchChange)="onSearchChange($event)"
    />
  </div>

  @if (showStats()) {
    <div class="grid grid-cols-2 gap-4 lg:grid-cols-4">
      <app-stats-card
        label="Total Projects"
        [value]="getFilteredCount('all')"
        icon="assignment"
        iconBgClass="bg-blue-500"
      />
      <app-stats-card
        label="Active"
        [value]="getFilteredCount('active')"
        icon="play_circle"
        iconBgClass="bg-orange-500"
      />
      <app-stats-card
        label="Completed"
        [value]="getFilteredCount('completed')"
        icon="check_circle"
        iconBgClass="bg-green-500"
      />
      <app-stats-card
        label="This Week"
        [value]="getFilteredCount('week')"
        icon="calendar_today"
        iconBgClass="bg-purple-500"
      />
    </div>
  }

  @if (isSharedMode() && isOffline()) {
    <div
      class="flex items-center gap-3 rounded-xl border border-amber-500/50 bg-amber-500/10 px-4 py-3 text-amber-700 dark:bg-amber-600/10 dark:text-amber-400"
    >
      <mat-icon fontIcon="cloud_off" class="!h-6 !w-6 !min-w-[24px]" />
      <div>
        <p class="font-medium">You are offline</p>
        <p class="text-sm opacity-90">
          Shared projects are read from cache. Changes will sync when you're back online.
        </p>
      </div>
    </div>
  }

  <app-todos-list
    [selectedTodos]="selectedTodos"
    [lastSelectedId]="lastSelectedId"
    [viewMode]="viewMode()"
    [highlightTodoId]="highlightTodoId()"
    [userId]="userId()"
    [showBulkActions]="true"
    [todoPlaceholder]="todoPlaceholder"
    [isAllSelected]="isAllSelected()"
    (todoDeleted)="deleteTodoById($event.id, $event.isOwner)"
    (todoArchived)="archiveTodoById($event)"
    (todoRestored)="restoreTodoById($event)"
    (todoSavedAsBlueprint)="saveAsBlueprint($event)"
    (todoUpdated)="onUpdateTodo($event.todo, $event.event)"
    (selectionChanged)="toggleTodoSelection($event)"
    (selectAll)="onTableSelectAll($event)"
    (clearSelection)="clearSelection()"
    (bulkArchive)="bulkArchive()"
    (rangeSelect)="onRangeSelect($event)"
    (additiveSelect)="onAdditiveSelect($event)"
    (rowClick)="onRowClick($event)"
    (tableAction)="onTableAction($event)"
    (todoDropped)="onTodoDrop($event)"
    (todoListDropped)="onTodoListDropped($event)"
  />

  <app-blueprint-create-dialog
    [show]="blueprintService.showCreateBlueprintDialog()"
    [name]="blueprintService.newBlueprintName()"
    [description]="blueprintService.newBlueprintDescription()"
    (nameChange)="blueprintService.newBlueprintName.set($event)"
    (descriptionChange)="blueprintService.newBlueprintDescription.set($event)"
    (confirm)="confirmSaveAsBlueprint()"
    (cancel)="closeCreateBlueprintDialog()"
  />

  <app-blueprint-selection-dialog
    [show]="blueprintService.showBlueprintDialog()"
    [templates]="templateService.getTemplates()"
    (templateSelected)="openApplyBlueprint($event)"
    (templateRemoved)="removeBlueprint($event)"
    (closed)="blueprintService.showBlueprintDialog.set(false)"
  />

  <app-blueprint-apply-dialog
    [show]="blueprintService.showApplyBlueprintDialog()"
    [title]="blueprintService.applyBlueprintTitle()"
    (titleChange)="blueprintService.applyBlueprintTitle.set($event)"
    (confirm)="confirmCreateFromBlueprint()"
    (cancel)="blueprintService.showApplyBlueprintDialog.set(false)"
  />

  @if (todoPagination().hasMore) {
    <div class="flex justify-center py-4">
      <button
        class="flex items-center gap-2 rounded-lg border border-gray-300 px-4 py-2 text-gray-700 transition-colors hover:bg-gray-50 dark:border-zinc-600 dark:text-gray-300 dark:hover:bg-zinc-800"
        [disabled]="todoPagination().loading"
        (click)="loadMore()"
      >
        @if (todoPagination().loading) {
          <span>Loading...</span>
        } @else {
          <span>Load More</span>
        }
      </button>
    </div>
  }
</div>
