<div
  class="top-0 left-0 m-0 flex min-h-screen w-full flex-col overflow-x-auto bg-linear-to-br from-blue-50 to-indigo-100 dark:from-zinc-900 dark:to-zinc-800"
>
  <div
    class="m-auto flex w-full max-w-md flex-col rounded-xl border border-gray-200 bg-white p-6 shadow-2xl dark:border-zinc-700 dark:bg-zinc-800"
  >
    <div class="mb-6 text-center">
      <div class="mb-4">
        <mat-icon
          class="h-12! w-12! min-w-12 text-5xl! text-blue-600 dark:text-blue-400"
          fontIcon="person_add"
        />
      </div>
      <h1 class="textNormal mb-2 text-2xl font-bold">Create Your Profile</h1>
      <p class="textMuted">Fill out your information to get started</p>
    </div>

    <div class="space-y-4">
      <app-form
        [form]="form!"
        [formFields]="formFields"
        [isShowCloseButton]="false"
        (onSubmit)="onSubmit()"
      />
    </div>

    <div class="mt-6 border-t border-gray-200 pt-4 text-center dark:border-zinc-600">
      <p class="textMuted text-sm">
        Already have an account?
        <a routerLink="/login" class="styleLinkRedir ml-1">Sign in</a>
      </p>
    </div>
  </div>
</div>
