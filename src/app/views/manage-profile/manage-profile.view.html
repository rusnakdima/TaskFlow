<div
  class="top-0 left-0 m-0 flex w-full flex-col items-center justify-center overflow-y-auto bg-linear-to-br from-purple-50 to-pink-100 dark:from-zinc-900 dark:to-zinc-800"
  style="min-height: calc(100vh - 150px)"
>
  <div
    class="m-auto flex w-full max-w-md flex-col rounded-xl border border-gray-200 bg-white p-6 shadow-2xl dark:border-zinc-700 dark:bg-zinc-800"
  >
    <div class="mb-6 text-center">
      <div class="mb-4">
        <mat-icon
          class="h-9! w-9! text-5xl! text-purple-600 dark:text-purple-400"
          [fontIcon]="isEditMode ? 'edit' : 'person_add'"
        />
      </div>
      <h1 class="textNormal mb-2 text-2xl font-bold">
        {{ isEditMode ? "Edit Your Profile" : "Create Your Profile" }}
      </h1>
      <p class="textMuted">
        {{ isEditMode ? "Update your information" : "Set up your profile" }}
      </p>
    </div>

    <div class="space-y-4">
      <app-form
        [form]="form!"
        [formFields]="formFields"
        [isShowCloseButton]="false"
        (onSubmit)="onSubmit()"
      />
    </div>

    <div class="mt-6 border-t border-gray-200 pt-4 text-center dark:border-zinc-600">
      <button [routerLink]="['/profile']" class="styleLinkRedir">
        <mat-icon class="mr-1 h-5! w-5! min-w-5 text-xl!" fontIcon="arrow_back" />
        Back to Profile
      </button>
    </div>
  </div>
</div>
