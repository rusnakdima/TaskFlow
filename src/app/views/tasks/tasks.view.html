<div class="flex flex-col gap-6">
  @if (todo()) {
    <app-todo-information [todo]="todo()!" />
  }

  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h2 class="text-xl font-bold textNormal">Tasks</h2>
      <p class="textMuted">Manage and track individual tasks in this project</p>
    </div>

    <div class="flex flex-wrap gap-2">
      <button
        class="px-4 py-2 border border-gray-300 dark:border-zinc-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-zinc-800 transition-colors flex items-center gap-2"
        (click)="toggleFilter()"
      >
        <mat-icon
          class="w-5! h-5! text-xl!"
          [fontIcon]="showFilter() ? 'filter_list_off' : 'filter_list'"
        />
        Filter
      </button>
      <button class="styleButSuccess text-sm px-4 py-2" routerLink="create_task">
        <mat-icon class="w-5! h-5! text-xl! mr-2" fontIcon="add" />
        New Task
      </button>
    </div>
  </div>

  <!-- Filter Sidebar -->
  <app-filter-bar
    [filterOptions]="filterOptions"
    [activeFilter]="activeFilter()"
    [showFilter]="showFilter()"
    [searchTempArray]="tasks()"
    [searchByFields]="['title']"
    filterLabel="Status"
    filterGroupName="task-filter"
    (filterToggle)="toggleFilter()"
    (filterChange)="changeFilter($any($event))"
    (searchChange)="onSearchChange($any($event))"
    (searchResults)="onSearchResults($any($event))"
    (applyFiltersEvent)="applyFilter()"
    (clearFiltersEvent)="clearFilters()"
  />

  @if (showBulkActions()) {
    <app-bulk-actions
      [selectedCount]="selectedTasks().size"
      [isAllSelected]="isAllSelected()"
      (selectAllEvent)="toggleSelectAll()"
      (bulkPriorityEvent)="bulkUpdatePriority($any($event))"
      (bulkStatusEvent)="bulkUpdateStatus($any($event))"
      (bulkDeleteEvent)="bulkDelete()"
      (cancelEvent)="clearSelection()"
    />
  }

  @if (listTasks().length === 0) {
    <div
      class="bg-white dark:bg-zinc-800 rounded-xl p-12 shadow-lg border border-gray-200 dark:border-zinc-700 text-center"
    >
      <mat-icon class="w-12! h-12! text-5xl! textMuted mb-4" fontIcon="assignment" />
      <h3 class="text-xl font-semibold textNormal mb-2">No tasks found</h3>
      <p class="textMuted">
        @if (activeFilter() !== "all") {
          No tasks match the current filter
        }
      </p>
    </div>
  } @else {
    <div
      class="grid grid-cols-1 lg:grid-cols-2 gap-6"
      cdkDropList
      cdkDropListOrientation="mixed"
      (cdkDropListDropped)="onTaskDrop($event)"
    >
      @for (task of listTasks(); track task.id) {
        <app-task
          cdkDrag
          class="h-full"
          [id]="'task-' + task.id"
          [task]="task"
          [index]="$index"
          [isOwner]="isOwner"
          [isPrivate]="isPrivate"
          [highlight]="highlightTaskId() === task.id"
          [isSelected]="selectedTasks().has(task.id)"
          [allTasks]="todo()?.tasks || []"
          [isExpanded]="false"
          (deleteTaskEvent)="deleteTask($event)"
          (toggleCompletionEvent)="toggleTaskCompletion($event)"
          (updateTaskEvent)="updateTaskInline($event)"
          (toggleSubtasksEvent)="toggleTaskCompletion($event)"
          (selectionChangeEvent)="toggleTaskSelection($event)"
        >
          <div
            *cdkDragPlaceholder
            class="cdk-drag-placeholder rounded-xl h-full min-h-[200px]"
          ></div>
        </app-task>
      }
    </div>
  }
</div>
