<div class="flex h-full w-full flex-col bg-slate-950">
  <header class="shrink-0 border-b border-slate-800/50 p-4">
    <div class="flex items-center gap-4">
      <button
        type="button"
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl text-slate-400 transition-all hover:bg-slate-800 hover:text-white"
        (click)="onCancel()"
      >
        <mat-icon fontIcon="arrow_back" class="!h-5 !w-5" />
      </button>
      <h1 class="text-lg font-bold text-white">Create Group</h1>
    </div>
  </header>

  <div class="flex flex-1 flex-col items-center justify-center p-6">
    <div class="w-full max-w-md">
      <div class="mb-6 flex justify-center">
        <div
          class="flex h-20 w-20 items-center justify-center rounded-3xl bg-[var(--accent-500)]/10 text-[var(--accent-color)]"
        >
          <mat-icon fontIcon="group_add" class="!h-10 !w-10" />
        </div>
      </div>

      <div class="mb-6">
        <label class="mb-2 block text-sm font-medium text-slate-300">Group Name</label>
        <input
          type="text"
          [value]="state.newGroupName()"
          (input)="state.newGroupName.set($any($event.target).value)"
          placeholder="Enter group name..."
          class="w-full rounded-xl border border-slate-800 bg-slate-900 px-4 py-3 text-sm text-slate-200 transition-all placeholder:text-slate-500 focus:border-[var(--accent-color)]/50 focus:ring-1 focus:ring-[var(--accent-color)]/50 focus:outline-none"
        />
      </div>

      <div class="flex gap-3">
        <button
          type="button"
          class="flex-1 rounded-xl border border-slate-700 px-4 py-3 text-sm font-medium text-slate-300 transition-colors hover:bg-slate-800"
          (click)="onCancel()"
        >
          Cancel
        </button>
        <button
          type="button"
          class="flex-1 rounded-xl bg-[var(--accent-color)] px-4 py-3 text-sm font-semibold text-white transition-all hover:shadow-[var(--accent-color)]/10 hover:shadow-lg disabled:opacity-50 disabled:hover:shadow-none"
          [disabled]="!state.newGroupName().trim()"
          (click)="onCreateGroup()"
        >
          Create Group
        </button>
      </div>
    </div>
  </div>
</div>
