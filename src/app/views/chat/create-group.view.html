<div class="flex h-full w-full flex-col bg-[var(--bg-primary)]">
  <header
    class="shrink-0 border-b border-[var(--accent-color)] p-4 dark:border-[var(--border-light)]"
  >
    <div class="flex items-center gap-4">
      <button
        type="button"
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl text-[var(--text-muted)] transition-all hover:bg-[var(--bg-elevated)] hover:text-[var(--text-primary)] dark:hover:bg-[var(--bg-elevated)]"
        (click)="onCancel()"
      >
        <mat-icon fontIcon="arrow_back" class="!h-5 !w-5" />
      </button>
      <h1 class="text-lg font-bold text-[var(--text-primary)]">Create Group</h1>
    </div>
  </header>

  <div class="flex flex-1 flex-col items-center justify-center p-6">
    <div class="w-full max-w-md">
      <div class="mb-6 flex justify-center">
        <div
          class="flex h-20 w-20 items-center justify-center rounded-3xl bg-[var(--accent-500)]/10 text-[var(--accent-color)]"
        >
          <mat-icon fontIcon="group_add" class="!h-10 !w-10" />
        </div>
      </div>

      <div class="mb-6">
        <label class="mb-2 block text-sm font-medium text-[var(--text-secondary)]"
          >Group Name</label
        >
        <input
          type="text"
          [value]="state.newGroupName()"
          (input)="state.newGroupName.set($any($event.target).value)"
          placeholder="Enter group name..."
          class="w-full rounded-xl border-2 border-[var(--accent-color)] bg-[var(--accent-200)] px-4 py-3 text-sm text-[var(--text-primary)] transition-all placeholder:text-[var(--text-muted)] focus:border-[var(--accent-color)]/50 focus:ring-1 focus:ring-[var(--accent-color)]/50 focus:outline-none dark:border-[var(--accent-400)] dark:bg-[var(--accent-900)/30]"
        />
      </div>

      <div class="flex gap-3">
        <button
          type="button"
          class="flex-1 rounded-xl border-2 border-[var(--accent-color)] px-4 py-3 text-sm font-medium text-[var(--text-secondary)] transition-colors hover:bg-[var(--accent-200)] dark:border-[var(--accent-400)] dark:hover:bg-[var(--accent-900)/30]"
          (click)="onCancel()"
        >
          Cancel
        </button>
        <button
          type="button"
          class="flex-1 rounded-xl bg-[var(--accent-color)] px-4 py-3 text-sm font-semibold text-[var(--text-primary)] transition-all hover:shadow-[var(--accent-color)]/10 hover:shadow-lg disabled:opacity-50 disabled:hover:shadow-none dark:text-white"
          [disabled]="!state.newGroupName().trim()"
          (click)="onCreateGroup()"
        >
          Create Group
        </button>
      </div>
    </div>
  </div>
</div>
