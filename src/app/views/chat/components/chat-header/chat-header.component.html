<header
  class="sticky top-0 z-10 flex h-16 shrink-0 items-center justify-between border-b border-[var(--accent-color)] bg-white px-4 transition-all duration-300 sm:px-6 dark:bg-zinc-800"
>
  <div class="flex items-center gap-3">
    @if (isMobile) {
      <button
        type="button"
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl text-gray-500 transition-colors hover:bg-gray-100 hover:text-[var(--accent-color)] dark:text-gray-400 dark:hover:bg-zinc-700"
        (click)="back.emit()"
      >
        <mat-icon fontIcon="arrow_back" class="!h-5 !w-5" />
      </button>
    }

    <div class="relative shrink-0">
      <app-user-avatar [src]="conversation?.avatar" [name]="conversation?.name || ''" size="md" />
      @if (conversation?.isOnline) {
        <div
          class="absolute right-0 bottom-0 h-2.5 w-2.5 rounded-full border-2 border-white bg-emerald-500 dark:border-zinc-800"
        ></div>
      }
    </div>

    <div class="min-w-0 flex-1">
      <h2 class="textNormal truncate text-sm font-semibold">
        {{ conversation?.name || "Chat" }}
      </h2>
      @if (conversation?.isTyping) {
        <p class="flex items-center gap-1 text-xs text-[var(--accent-color)]">
          <span class="h-1.5 w-1.5 animate-pulse rounded-full bg-[var(--accent-color)]"></span>
          typing...
        </p>
      } @else if (conversation?.isOnline) {
        <p class="flex items-center gap-1 text-xs text-emerald-500">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
          Active now
        </p>
      } @else if (conversation?.isGroup) {
        <p class="textMuted text-xs">{{ conversation?.memberCount || 0 }} members</p>
      } @else {
        <p class="textMuted text-xs">Offline</p>
      }
    </div>
  </div>

  <div class="flex items-center gap-1">
    <button
      type="button"
      class="rounded-xl p-2 transition-colors"
      [class]="
        showDetailsPanel
          ? 'border border-[var(--accent-color)]/50 text-[var(--accent-color)] dark:border-[var(--accent-color)]/50'
          : 'text-gray-500 hover:bg-gray-100 hover:text-[var(--accent-color)] dark:text-gray-400 dark:hover:bg-zinc-700'
      "
      (click)="toggleDetails.emit()"
      title="Toggle details"
    >
      <mat-icon fontIcon="info" class="!h-5 !w-5" />
    </button>
  </div>
</header>
