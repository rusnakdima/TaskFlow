<div class="chat-message-enter flex items-end gap-3 px-2 py-1">
  @if (avatarUrl) {
    <app-user-avatar
      [src]="avatarUrl"
      [name]="userName"
      size="sm"
      class="shrink-0 ring-2 ring-[var(--border-color)] dark:ring-[var(--border-light)]"
    />
  } @else {
    <div class="w-8 shrink-0"></div>
  }
  <div
    class="flex items-center gap-2 rounded-2xl border border-[var(--accent-color)] bg-[var(--bg-elevated)] px-4 py-3 shadow-sm dark:border-[var(--border-light)]"
  >
    <span
      class="chat-typing-dot animate-delay-[0ms] h-2 w-2 rounded-full bg-[var(--accent-color)]"
    ></span>
    <span
      class="chat-typing-dot animate-delay-[150ms] h-2 w-2 rounded-full bg-[var(--accent-color)]"
    ></span>
    <span
      class="chat-typing-dot animate-delay-[300ms] h-2 w-2 rounded-full bg-[var(--accent-color)]"
    ></span>
    @if (userName) {
      <span class="ml-1 text-xs font-medium text-[var(--text-muted)]">
        {{ userName }} is typing
      </span>
    } @else {
      <span class="ml-1 text-xs font-medium text-[var(--text-muted)]"> Someone is typing </span>
    }
  </div>
</div>
