<div class="chat-message-enter flex items-end gap-3 px-2 py-1">
  @if (avatarUrl) {
    <app-user-avatar
      [src]="avatarUrl"
      [name]="userName"
      size="sm"
      class="shrink-0 ring-2 ring-slate-900"
    />
  } @else {
    <div class="w-8 shrink-0"></div>
  }
  <div
    class="flex items-center gap-2 rounded-2xl border border-slate-800/80 bg-slate-900 px-4 py-3 shadow-sm"
  >
    <span
      class="chat-typing-dot h-2 w-2 rounded-full bg-[var(--accent-color)]"
      style="animation-delay: 0ms"
    ></span>
    <span
      class="chat-typing-dot h-2 w-2 rounded-full bg-[var(--accent-color)]"
      style="animation-delay: 150ms"
    ></span>
    <span
      class="chat-typing-dot h-2 w-2 rounded-full bg-[var(--accent-color)]"
      style="animation-delay: 300ms"
    ></span>
    @if (userName) {
      <span class="ml-1 text-xs font-medium text-slate-400"> {{ userName }} is typing </span>
    } @else {
      <span class="ml-1 text-xs font-medium text-slate-400"> Someone is typing </span>
    }
  </div>
</div>
