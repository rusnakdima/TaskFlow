<div
  class="border-t border-[var(--accent-color)] bg-transparent p-4 transition-all duration-300 dark:bg-transparent"
>
  <div class="mx-auto flex max-w-4xl items-end gap-2">
    <button
      type="button"
      class="shrink-0 rounded-xl border border-[var(--accent-color)] bg-[var(--bg-secondary)] p-3 text-[var(--text-muted)] transition-colors hover:bg-[var(--bg-elevated)] hover:text-[var(--accent-color)] dark:hover:bg-zinc-600"
      title="Attach"
      (click)="onToggleAttachmentMenu()"
    >
      <mat-icon fontIcon="attach_file" class="!h-5 !w-5" />
    </button>

    @if (showAttachmentMenu) {
      <div
        class="absolute bottom-full left-0 z-50 mb-2 w-48 rounded-xl border border-[var(--accent-color)] bg-transparent p-2 shadow-xl dark:bg-transparent"
      >
        <button
          type="button"
          class="flex w-full items-center gap-3 rounded-lg p-3 text-left text-sm text-gray-700 transition-colors hover:bg-gray-100 dark:text-gray-200 dark:hover:bg-zinc-700"
        >
          <mat-icon fontIcon="image" class="!h-4 !w-4 text-[var(--accent-color)]" />
          Photo
        </button>
        <button
          type="button"
          class="flex w-full items-center gap-3 rounded-lg p-3 text-left text-sm text-gray-700 transition-colors hover:bg-gray-100 dark:text-gray-200 dark:hover:bg-zinc-700"
        >
          <mat-icon fontIcon="videocam" class="!h-4 !w-4 text-[var(--accent-color)]" />
          Video
        </button>
        <button
          type="button"
          class="flex w-full items-center gap-3 rounded-lg p-3 text-left text-sm text-gray-700 transition-colors hover:bg-gray-100 dark:text-gray-200 dark:hover:bg-zinc-700"
        >
          <mat-icon fontIcon="folder" class="!h-4 !w-4 text-[var(--accent-color)]" />
          File
        </button>
      </div>
    }

    <div class="relative mr-2 ml-2 flex h-full flex-1 flex-col">
      @if (replyTo) {
        <div
          class="mb-2 flex items-start gap-2 rounded-xl border-l-[3px] border-[var(--accent-color)] bg-transparent px-3 py-2 dark:bg-transparent"
        >
          <div class="flex-1 overflow-hidden">
            <span class="mb-0.5 block text-xs font-bold tracking-wide text-[var(--accent-color)]">
              Replying to {{ replyTo.senderName }}
            </span>
            <p class="truncate text-sm text-gray-600 dark:text-gray-300">{{ replyTo.content }}</p>
          </div>
          <button
            type="button"
            class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full text-gray-400 transition-colors hover:bg-gray-200 hover:text-gray-600 dark:text-gray-500 dark:hover:bg-zinc-600 dark:hover:text-gray-300"
            (click)="onCancelReply()"
          >
            <mat-icon fontIcon="close" class="!h-4 !w-4" />
          </button>
        </div>
      }

      <div
        class="relative flex items-end rounded-2xl border border-[var(--accent-color)] bg-transparent transition-all focus-within:border-[var(--accent-color)] focus-within:ring-2 focus-within:ring-[var(--accent-100)] dark:bg-transparent"
      >
        <textarea
          class="max-h-32 min-h-[40px] w-full resize-none rounded-2xl border-0 bg-transparent py-3 pr-16 pl-4 text-sm leading-relaxed text-gray-800 transition-colors placeholder:text-gray-400 focus:ring-0 focus:outline-none dark:text-gray-200 dark:placeholder:text-gray-500"
          [value]="messageInput"
          (input)="onInputChange($any($event.target).value)"
          (keydown)="onKeydown($event)"
          placeholder="Type a message..."
          rows="1"
        ></textarea>

        <button
          type="button"
          class="absolute right-14 bottom-2 rounded-lg p-1.5 text-gray-400 transition-colors hover:bg-gray-200 hover:text-[var(--accent-color)] dark:text-gray-500 dark:hover:bg-zinc-700"
          (click)="onToggleEmojiPicker()"
        >
          <mat-icon fontIcon="emoji_emotions" class="!h-5 !w-5 align-middle" />
        </button>

        @if (messageInput.trim()) {
          <button
            type="submit"
            class="absolute right-2 bottom-2 rounded-xl border-2 border-[var(--accent-color)]/50 bg-transparent p-2.5 text-[var(--accent-color)] shadow-md transition-colors hover:bg-[var(--accent-color)]/10 dark:text-white dark:hover:bg-[var(--accent-color)]/20"
            (click)="onSend()"
          >
            <mat-icon fontIcon="send" class="!h-5 !w-5" />
          </button>
        } @else {
          <button
            type="button"
            disabled
            class="absolute right-2 bottom-2 rounded-xl p-2.5 text-gray-300 dark:text-gray-600"
          >
            <mat-icon fontIcon="send" class="!h-5 !w-5" />
          </button>
        }
      </div>

      @if (showEmojiPicker) {
        <div
          class="absolute right-0 bottom-full z-50 mb-3 w-80 overflow-hidden rounded-2xl border border-[var(--accent-color)] bg-transparent shadow-xl dark:bg-transparent"
        >
          <div class="flex border-b border-[var(--accent-color)]">
            <button
              type="button"
              class="flex-1 p-3 text-center transition-colors"
              [ngClass]="
                activeEmojiTab === 'recent' ? 'text-[var(--accent-color)]' : 'text-gray-400'
              "
              (click)="onSetEmojiTab('recent')"
            >
              <span class="text-lg">🕐</span>
            </button>
            <button
              type="button"
              class="flex-1 p-3 text-center transition-colors"
              [ngClass]="
                activeEmojiTab === 'smileys' ? 'text-[var(--accent-color)]' : 'text-gray-400'
              "
              (click)="onSetEmojiTab('smileys')"
            >
              <span class="text-lg">😊</span>
            </button>
            <button
              type="button"
              class="flex-1 p-3 text-center transition-colors"
              [ngClass]="
                activeEmojiTab === 'gestures' ? 'text-[var(--accent-color)]' : 'text-gray-400'
              "
              (click)="onSetEmojiTab('gestures')"
            >
              <span class="text-lg">👋</span>
            </button>
            <button
              type="button"
              class="flex-1 p-3 text-center transition-colors"
              [ngClass]="
                activeEmojiTab === 'objects' ? 'text-[var(--accent-color)]' : 'text-gray-400'
              "
              (click)="onSetEmojiTab('objects')"
            >
              <span class="text-lg">💡</span>
            </button>
          </div>
          <div class="no-scrollbar max-h-48 overflow-y-auto p-2">
            <div class="grid grid-cols-8 gap-1">
              @for (emoji of currentEmojis; track emoji) {
                <button
                  type="button"
                  class="flex h-9 w-9 items-center justify-center rounded-lg text-lg transition-colors hover:bg-gray-100 hover:text-[var(--accent-color)] dark:hover:bg-zinc-700"
                  (click)="onEmojiSelect(emoji)"
                >
                  {{ emoji }}
                </button>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
