<div class="relative mt-1 flex items-center gap-1" [class.flex-row-reverse]="alignLeft">
  @if (reactions.length > 0) {
    <div class="flex flex-wrap gap-1">
      @for (reaction of reactions; track reaction.emoji) {
        <button
          class="chat-reaction-pop flex items-center gap-1 rounded-full border px-2 py-0.5 text-xs font-semibold shadow-sm transition-all duration-200 hover:scale-105 active:scale-95"
          [ngClass]="{
            'border-[var(--accent-color)]': reaction.isOwn,
            'bg-[var(--accent-50)]': reaction.isOwn,
            'text-[var(--accent-color)]': reaction.isOwn,
            'dark:border-zinc-600': !reaction.isOwn,
            'dark:bg-zinc-700': !reaction.isOwn,
            'text-gray-600': !reaction.isOwn,
            'dark:text-gray-300': !reaction.isOwn,
          }"
          (click)="
            reaction.isOwn ? removeReaction.emit(reaction.emoji) : addReaction.emit(reaction.emoji)
          "
        >
          <span class="text-sm">{{ reaction.emoji }}</span>
          <span [ngClass]="reaction.isOwn ? 'text-[var(--accent-color)]' : 'text-gray-400'">{{
            reaction.count
          }}</span>
        </button>
      }
    </div>
  }
</div>
